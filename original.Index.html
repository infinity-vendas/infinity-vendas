<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FAELZIN VENDAS FF</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b0b0b;
    color:#fff;
    overflow-x:hidden;
}

/* ================= HEADER ================= */

header{
    width:100%;
    padding:20px;
    background:#111;
    border-bottom:2px solid #ff8800;
    position:sticky;
    top:0;
    z-index:999;
}

header h1{
    text-align:center;
    color:#ff8800;
    font-size:30px;
    font-weight:700;
}

/* ================= CONTAINER ================= */

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
    padding:20px;
}

/* ================= LOGIN BUTTON ================= */

#openLoginBtn{

    position:fixed;

    left:15px;
    bottom:15px;

    z-index:99999;

    background:#ff8800;

    color:#fff;

    border:none;

    padding:14px 24px;

    border-radius:14px;

    font-weight:bold;

    box-shadow:0 0 20px rgba(0,0,0,.5);

    transition:.3s;
}

#openLoginBtn:hover{

    background:#ff6a00;

}

/* ================= LOGIN BOX ================= */

.login-box{

    background:rgba(21,21,21,.98);

    padding:20px;

    border-radius:18px;

    border:1px solid #222;

    width:100%;
    max-width:360px;

    position:fixed;

    left:15px;
    bottom:75px;

    z-index:9999;

    backdrop-filter:blur(10px);

    box-shadow:0 0 25px rgba(0,0,0,.6);

    animation:showLogin .3s ease;

}

.hidden-login{

    display:none;

}

.login-header{

    display:flex;

    align-items:center;

    justify-content:space-between;

    margin-bottom:15px;
}

.login-header h2{

    color:#ff8800;
}

.close-login{

    background:#ff8800;

    border:none;

    color:#fff;

    width:35px;
    height:35px;

    border-radius:10px;

    font-weight:bold;
}

@keyframes showLogin{

    from{

        opacity:0;
        transform:translateY(20px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

/* ================= INPUTS ================= */

input{
    width:100%;
    padding:13px;
    margin-bottom:12px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#222;
    color:#fff;
    font-size:15px;
}

button{
    cursor:pointer;
}

/* ================= LOGIN BUTTON ================= */

.login-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#ff8800;
    color:#fff;
    font-weight:bold;
    font-size:15px;
    transition:.3s;
}

.login-btn:hover{
    background:#ff6a00;
}

/* ================= NOTICE ================= */

.notice{
    background:#1d1d1d;
    border-left:4px solid #ff8800;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    font-size:14px;
    color:#ccc;
}

/* ================= PRODUCTS ================= */

.products{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

    gap:20px;

    margin-top:20px;

    padding-bottom:180px;

}

.card{
    background:#151515;
    border:1px solid #222;
    border-radius:18px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.card:hover{
    transform:translateY(-5px);
    border-color:#ff8800;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card-content h2{
    color:#ff8800;
    margin-bottom:10px;
    font-size:22px;
}

.price{
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

.seller{
    color:#aaa;
    font-size:14px;
    margin-bottom:15px;
}

.buy-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#ff8800;
    color:#fff;
    font-weight:bold;
    transition:.3s;
}

.buy-btn:hover{
    background:#ff6a00;
}

/* ================= ADMIN PANEL ================= */

#adminPanel{
    position:fixed;
    top:20px;
    right:20px;
    width:350px;
    max-height:92vh;
    overflow:auto;
    background:#111;
    border:2px solid #ff8800;
    border-radius:18px;
    z-index:99999;
    box-shadow:0 0 30px rgba(0,0,0,.7);
}

.admin-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#1a1a1a;
    border-bottom:1px solid #333;
}

.admin-header h2{
    color:#ff8800;
    font-size:18px;
}

.minimize-btn{
    background:#ff8800;
    border:none;
    color:#fff;
    padding:8px 14px;
    border-radius:10px;
    font-weight:bold;
}

.admin-content{
    padding:15px;
}

.admin-content button{
    width:100%;
    margin-bottom:10px;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#ff8800;
    color:#fff;
    font-weight:bold;
    transition:.3s;
}

.admin-content button:hover{
    background:#ff6a00;
}

/* ================= FOOTER ================= */

footer{
    text-align:center;
    padding:40px;
    color:#888;
}

/* ================= HIDDEN ================= */

.hidden{
    display:none;
}

/* ================= SCROLL ================= */

::-webkit-scrollbar{
    width:5px;
}

::-webkit-scrollbar-thumb{
    background:#ff8800;
    border-radius:10px;
}

/* ================= MOBILE ================= */

@media(max-width:700px){

    #adminPanel{

        width:95%;

        left:10px;
        right:10px;
    }

    .login-box{

        width:90%;

        max-width:320px;

        left:50%;

        transform:translateX(-50%);

        bottom:80px;

    }

}

</style>
</head>
<body>

<header>

    <h1>FAELZIN VENDAS FF</h1>

</header>

<div class="container">

    <!-- BOTÃO LOGIN -->

    <button id="openLoginBtn" onclick="toggleLoginBox()">

        LOGIN

    </button>

    <!-- LOGIN BOX -->

    <div class="login-box hidden-login" id="loginBox">

        <div class="login-header">

            <h2>LOGIN</h2>

            <button class="close-login" onclick="toggleLoginBox()">

                ✕

            </button>

        </div>

        <input type="email" id="email" placeholder="Seu email">

        <input type="password" id="password" placeholder="Sua senha">

        <button class="login-btn" onclick="login()">

            ENTRAR

        </button>

        <div class="notice" id="status">

            Faça login para acessar painel.

        </div>

    </div>

    <!-- PRODUTOS -->

    <div class="products" id="products"></div>

</div>

<!-- ADMIN PANEL -->

<div id="adminPanel" class="hidden">

    <div class="admin-header">

        <h2>PAINEL ADMIN</h2>

        <button class="minimize-btn" onclick="togglePanel()">

            —

        </button>

    </div>

    <div class="admin-content" id="adminContent">

        <input type="text" id="productName" placeholder="Nome produto">

        <input type="text" id="productPrice" placeholder="Preço">

        <input type="text" id="productImage" placeholder="Imagem URL">

        <button onclick="addProduct()">

            Adicionar Produto

        </button>

        <hr style="margin:15px 0;border-color:#333;">

        <input type="email" id="sellerEmail" placeholder="Email vendedor">

        <button onclick="promoteSeller()">

            Promover vendedor

        </button>

        <button onclick="blockSeller()">

            Bloquear vendedor

        </button>

        <button onclick="unblockSeller()">

            Desbloquear vendedor

        </button>

        <button onclick="removeSeller()">

            Remover vendedor

        </button>

        <button onclick="deleteProduct()">

            Deletar produtos

        </button>

    </div>

</div>

<footer>

    © 2026 - FAELZIN VENDAS FF

</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    setDoc,
    getDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ================= FIREBASE CONFIG ================= */

const firebaseConfig = {
  apiKey: "AIzaSyDUSye7h9KBUdrvyXyZQRNZWA1I8iyMJIE",
  authDomain: "infinity-site-18b8c.firebaseapp.com",
  databaseURL: "https://infinity-site-18b8c-default-rtdb.firebaseio.com",
  projectId: "infinity-site-18b8c",
  storageBucket: "infinity-site-18b8c.firebasestorage.app",
  messagingSenderId: "365343504184",
  appId: "1:365343504184:web:fe7365e122ae60fc1e73cd",
  measurementId: "G-0JT03KFEVS"
};

/* ================= START FIREBASE ================= */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

window.currentUserRole = null;

/* ================= TOGGLE LOGIN ================= */

window.toggleLoginBox = ()=>{

    const loginBox =
    document.getElementById('loginBox');

    loginBox.classList.toggle('hidden-login');

};

/* ================= LOGIN ================= */

window.login = async()=>{

    const email =
    document.getElementById('email').value;

    const password =
    document.getElementById('password').value;

    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        document.getElementById('status').innerHTML =
        "Login efetuado com sucesso.";

    }catch(err){

        document.getElementById('status').innerHTML =
        "Erro login: " + err.message;

    }

};

/* ================= AUTH ================= */

onAuthStateChanged(auth, async(user)=>{

    if(user){

        const ref =
        doc(db,"users",user.uid);

        const snap =
        await getDoc(ref);

        if(snap.exists()){

            const data =
            snap.data();

            window.currentUserRole =
            data.role;

            if(data.blocked){

                alert(
                    "Sua conta foi bloqueada."
                );

                return;
            }

            if(data.role === "admin"){

                document.getElementById(
                    'adminPanel'
                ).classList.remove('hidden');

            }

            if(data.role === "seller"){

                document.getElementById(
                    'adminPanel'
                ).classList.remove('hidden');

                disableSellerButtons();

            }

        }

    }

});

/* ================= LOAD PRODUCTS ================= */

async function loadProducts(){

    const productsDiv =
    document.getElementById('products');

    productsDiv.innerHTML = "";

    const querySnapshot =
    await getDocs(collection(db,"products"));

    querySnapshot.forEach((docu)=>{

        const data =
        docu.data();

        productsDiv.innerHTML += `

        <div class="card">

            <img src="${data.image}">

            <div class="card-content">

                <h2>${data.name}</h2>

                <div class="price">

                    R$ ${data.price}

                </div>

                <div class="seller">

                    Vendedor: ${data.seller}

                </div>

                <button class="buy-btn">

                    COMPRAR

                </button>

            </div>

        </div>

        `;

    });

}

loadProducts();

/* ================= ADD PRODUCT ================= */

window.addProduct = async()=>{

    if(window.currentUserRole !== "admin"
    && window.currentUserRole !== "seller"){

        return alert("Sem permissão.");

    }

    const name =
    document.getElementById('productName').value;

    const price =
    document.getElementById('productPrice').value;

    const image =
    document.getElementById('productImage').value;

    await addDoc(collection(db,"products"),{

        name,
        price,
        image,
        seller: auth.currentUser.email

    });

    alert("Produto adicionado.");

    loadProducts();

};

/* ================= DELETE PRODUCTS ================= */

window.deleteProduct = async()=>{

    if(window.currentUserRole !== "admin"){

        return alert(
        "Favor entre em contato com administrador dono !"
        );

    }

    const snapshot =
    await getDocs(collection(db,"products"));

    snapshot.forEach(async(item)=>{

        await deleteDoc(
            doc(db,"products",item.id)
        );

    });

    alert("Produtos deletados.");

    loadProducts();

};

/* ================= PROMOTE SELLER ================= */

window.promoteSeller = async()=>{

    if(window.currentUserRole !== "admin"){

        return alert(
        "Favor entre em contato com administrador dono !"
        );

    }

    const email =
    document.getElementById('sellerEmail').value;

    const id = btoa(email);

    await setDoc(doc(db,"users",id),{

        email,
        role:"seller",
        blocked:false

    });

    alert("Vendedor promovido.");

};

/* ================= BLOCK SELLER ================= */

window.blockSeller = async()=>{

    if(window.currentUserRole !== "admin"){

        return alert(
        "Favor entre em contato com administrador dono !"
        );

    }

    const email =
    document.getElementById('sellerEmail').value;

    const id = btoa(email);

    await setDoc(doc(db,"users",id),{

        email,
        role:"seller",
        blocked:true

    });

    alert("Vendedor bloqueado.");

};

/* ================= UNBLOCK SELLER ================= */

window.unblockSeller = async()=>{

    if(window.currentUserRole !== "admin"){

        return alert(
        "Favor entre em contato com administrador dono !"
        );

    }

    const email =
    document.getElementById('sellerEmail').value;

    const id = btoa(email);

    await setDoc(doc(db,"users",id),{

        email,
        role:"seller",
        blocked:false

    });

    alert("Vendedor desbloqueado.");

};

/* ================= REMOVE SELLER ================= */

window.removeSeller = async()=>{

    if(window.currentUserRole !== "admin"){

        return alert(
        "Favor entre em contato com administrador dono !"
        );

    }

    const email =
    document.getElementById('sellerEmail').value;

    const id = btoa(email);

    await deleteDoc(
        doc(db,"users",id)
    );

    alert("Vendedor removido.");

};

/* ================= SELLER LIMIT ================= */

function disableSellerButtons(){

    const buttons =
    document.querySelectorAll(
        '.admin-content button'
    );

    buttons.forEach(btn=>{

        if(btn.innerText !==
        "Adicionar Produto"){

            btn.style.opacity = "0.5";

        }

    });

}

/* ================= MINIMIZE PANEL ================= */

window.togglePanel = ()=>{

    const content =
    document.getElementById(
        'adminContent'
    );

    if(content.style.display === "none"){

        content.style.display = "block";

    }else{

        content.style.display = "none";

    }

};

</script>

</body>
</html>
