<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY CLIENTES</title>

<link rel="icon" href="https://i.postimg.cc/Y9FHz03z/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#050510;color:white;}
header{text-align:center;padding:50px;background:#0a0a1a;box-shadow:0 0 25px #0044ff;}
.logo{width:100px;}
.container{max-width:1000px;margin:auto;padding:20px;}
.card{background:#0a0a1a;padding:20px;margin:15px 0;border-radius:15px;}
.catalog{border:1px solid #0044ff;padding:15px;margin-top:10px;border-radius:10px;background:#050510;}
.btn{display:inline-block;color:#00f0ff;border:1px solid #00f0ff;padding:10px 20px;border-radius:20px;text-decoration:none;margin-top:10px;}
.btn:hover{background:#00f0ff;color:black;}
footer{text-align:center;padding:20px;color:#00f0ff;}
.admin-panel{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#0a0a1a;padding:20px;
display:none;border-radius:10px;
box-shadow:0 0 20px #00f0ff;z-index:999;
}
input{padding:8px;margin:5px;width:90%;}
</style>
</head>

<body>

<header>
<img src="https://i.postimg.cc/Y9FHz03z/logo.jpg" class="logo">
<h1 id="titulo">INFINITY CLIENTES</h1>
<a class="btn" href="https://wa.me/5551981528372">Comprar</a>
</header>

<div class="container">
<div class="card">
<h2>PRODUTOS</h2>
<div id="produtos"></div>
</div>
</div>

<footer>© 2026 INFINITY CLIENTES</footer>

<!-- PAINEL ADMIN -->
<div class="admin-panel" id="adminPanel">
<h3>LOGIN ADMIN</h3>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="painelAdd" style="display:none;">
<h3>Adicionar Produto</h3>
<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">
<input id="link" placeholder="Link WhatsApp">
<button onclick="addProduto()">Adicionar</button>
</div>
</div>

<script type="module">
// 🔥 IMPORTS FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 SUA CONFIG (já preenchida)
const firebaseConfig = {
  apiKey: "AIzaSyDUSye7h9KBUdrvyXyZQRNZWA1I8iyMJIE",
  authDomain: "infinity-site-18b8c.firebaseapp.com",
  projectId: "infinity-site-18b8c",
  storageBucket: "infinity-site-18b8c.firebasestorage.app",
  messagingSenderId: "365343504184",
  appId: "1:365343504184:web:fe7365e122ae60fc1e73cd",
  measurementId: "G-0JT03KFEVS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ================= LOGIN =================
window.login = async function(){
let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;

try{
await signInWithEmailAndPassword(auth,email,senha);
alert("Logado!");
document.getElementById("painelAdd").style.display="block";
}catch(e){
alert("Erro: "+e.message);
}
}

// ================= ADD PRODUTO =================
window.addProduto = async function(){
let nome=document.getElementById("nome").value;
let preco=document.getElementById("preco").value;
let link=document.getElementById("link").value;

if(!nome||!preco||!link){
alert("Preencha tudo");
return;
}

await addDoc(collection(db,"produtos"),{
nome,preco,link,created:Date.now()
});

alert("Produto adicionado!");
}

// ================= LISTAR PRODUTOS =================
onSnapshot(collection(db,"produtos"),(snapshot)=>{
let html="";

snapshot.forEach(doc=>{
let p=doc.data();

html+=`
<div class="catalog">
<h3>${p.nome}</h3>
<p>Valor: ${p.preco}</p>
<a class="btn" href="${p.link}">Comprar</a>
</div>
`;
});

document.getElementById("produtos").innerHTML=html;
});

// ================= DETECTAR LOGIN =================
onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("painelAdd").style.display="block";
}
});
</script>

<script>
// 🔥 abrir painel com 3 cliques
let clicks=0;
document.getElementById("titulo").onclick=function(){
clicks++;
if(clicks>=3){
document.getElementById("adminPanel").style.display="block";
}
};
</script>

</body>
</html>
