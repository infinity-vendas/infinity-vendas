<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FNZ FAELZIN VENDAS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:#050505;
    color:#fff;
}

/* BLOQUEIOS BÁSICOS */
body{
    user-select:none;
}

img{
    pointer-events:none;
}

/* HEADER */
header{
    padding:20px;
    display:flex;
    justify-content:space-between;
    background:#111;
}

.logo{
    font-size:26px;
    font-weight:800;
    cursor:pointer;
    background:linear-gradient(90deg,#ff2d00,#ff7b00);
    -webkit-background-clip:text;
    color:transparent;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#111;
    border-radius:15px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    color:#ff7b00;
    font-size:20px;
    font-weight:700;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:8px;
}

.whats{
    background:#25D366;
}

.pay{
    background:linear-gradient(90deg,#ff2d00,#ff7b00);
}

/* ADMIN */
.admin{
    position:fixed;
    right:-400px;
    top:0;
    width:350px;
    height:100%;
    background:#111;
    transition:0.3s;
    padding:20px;
}

.admin.active{
    right:0;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#222;
    color:#fff;
    border:none;
}

.save{
    background:linear-gradient(90deg,#ff2d00,#ff7b00);
}

/* LOGIN ADMIN */
.login{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

.login-box{
    background:#111;
    padding:20px;
    border-radius:12px;
    width:280px;
}

.login input{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#222;
    color:#fff;
    border:none;
}

.login button{
    background:#ff2d00;
}

</style>
</head>

<body oncontextmenu="return false">

<header>
    <div class="logo" id="logo">FNZ FAELZIN VENDAS</div>
</header>

<div class="products" id="products"></div>

<!-- ADMIN PAINEL -->
<div class="admin" id="admin">

    <h3>ADMIN</h3>

    <input id="name" placeholder="Produto">
    <input id="price" placeholder="Preço">
    <input id="img" placeholder="Imagem URL">
    <textarea id="desc" placeholder="Descrição"></textarea>

    <button class="save" onclick="addProduct()">ADICIONAR</button>

</div>

<!-- LOGIN ADMIN -->
<div class="login" id="login">

    <div class="login-box">

        <h3>ACESSO ADMIN</h3>

        <input type="password" id="pass" placeholder="Senha">

        <button onclick="login()">ENTRAR</button>

    </div>

</div>

<script type="module">

/* ================= FIREBASE ================= */
let firebaseEnabled = false;
let db, col;

/* ================= PRODUTOS ================= */
let products =
JSON.parse(localStorage.getItem("fnz_products")) || [];

/* ================= RENDER ================= */
function renderProducts(){

    const container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach(p=>{

        container.innerHTML += `
        <div class="card">

            <img src="${p.img}">

            <div class="card-content">

                <h3>${p.name}</h3>

                <div class="price">R$ ${p.price}</div>

                <p>${p.desc}</p>

                <a href="https://wa.me/55${p.whats}" target="_blank">
                    <button class="whats">WhatsApp</button>
                </a>

                <button class="pay">Gerar PIX</button>

            </div>

        </div>
        `;
    });
}

/* ================= LOGIN ADMIN ================= */
window.login = function(){

    const pass = document.getElementById("pass").value;

    if(pass === "admin123"){

        sessionStorage.setItem("admin","true");

        document.getElementById("login").style.display="none";
        document.getElementById("admin").classList.add("active");

        alert("ADMIN LIBERADO");

    }else{
        alert("Senha incorreta");
    }
}

/* ================= ABRIR ADMIN ================= */
function openAdmin(){

    if(sessionStorage.getItem("admin") === "true"){
        document.getElementById("admin").classList.add("active");
    }else{
        document.getElementById("login").style.display="flex";
    }
}

/* ================= ADD ================= */
window.addProduct = function(){

    const data = {
        name:document.getElementById("name").value,
        price:document.getElementById("price").value,
        img:document.getElementById("img").value,
        desc:document.getElementById("desc").value,
        whats:"51981528372"
    };

    products.push(data);
    localStorage.setItem("fnz_products",JSON.stringify(products));

    renderProducts();

    alert("Produto adicionado!");
}

/* ================= ADMIN SECRETO ================= */
let clicks = 0;

document.getElementById("logo").onclick = () => {

    clicks++;

    if(clicks >= 50){
        openAdmin();
        clicks = 0;
    }
}

/* ================= PROTEÇÕES BÁSICAS ================= */

// bloquear teclas comuns
document.addEventListener("keydown",(e)=>{

    if(
        e.ctrlKey && 
        (e.key === "u" || e.key === "U" || e.key === "s")
    ){
        e.preventDefault();
    }

    if(e.key === "F12"){
        e.preventDefault();
    }

});

/* INIT */
renderProducts();

</script>

</body>
        </html>
