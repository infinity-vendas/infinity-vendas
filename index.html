<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff;}
header{background:#b30000;padding:14px;text-align:center;font-weight:bold;}
#ticker{background:#111;padding:10px;font-size:12px;color:#ff4d4d;text-align:center;}
#products{padding:12px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

.card{background:#111;border:1px solid #333;border-radius:12px;padding:10px;font-size:12px;}
.card b{color:#ff4d4d;}

button{width:100%;padding:7px;margin-top:6px;border:none;border-radius:8px;background:#ff4d4d;color:#fff;}

#loginBtn{position:fixed;bottom:15px;right:70px;width:45px;height:45px;background:#ff4d4d;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0.5;}
#loginBox{position:fixed;bottom:70px;right:15px;width:200px;background:#111;padding:10px;border-radius:10px;display:none;}

#adminBtn{position:fixed;top:50%;right:10px;width:45px;height:45px;background:#ff4d4d;border-radius:50%;display:none;}
#adminPanel{position:fixed;top:10%;right:-360px;width:320px;height:80%;background:#111;padding:10px;transition:0.3s;overflow:auto;}
#adminPanel.open{right:0;}

input{width:100%;padding:8px;margin:5px 0;border-radius:8px;background:#000;color:#fff;border:1px solid #333;}

.timer{color:#00ff55;font-size:11px;margin-top:4px;}
</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>
<div id="ticker">Sistema profissional ativo</div>

<div id="products"></div>

<!-- LOGIN -->
<div id="loginBtn" onclick="toggleLogin()">🔐</div>
<div id="loginBox">
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">
<h3>ADMIN</h3>

<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">
<input id="descricao" placeholder="Descrição">
<input id="whats" placeholder="WhatsApp">
<input id="social" placeholder="Rede social">
<input id="estoque" placeholder="Estoque">

<input id="hora" placeholder="Horas">
<input id="minuto" placeholder="Minutos">
<input id="segundo" placeholder="Segundos">

<button onclick="addProduct()">Criar produto</button>

<hr>

<input id="uid" placeholder="UID produto">

<input id="newHora" placeholder="Nova hora">
<input id="newMin" placeholder="Novo minuto">
<input id="newSeg" placeholder="Novo segundo">

<button onclick="updateTime()">Alterar cronômetro</button>
<button onclick="updateStatus('aprovado')">Ativar</button>
<button onclick="updateStatus('bloqueado')">Bloquear</button>
<button onclick="deleteProduct()">Deletar</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyDX...",
authDomain:"infinity-vendas.firebaseapp.com",
databaseURL:"https://infinity-vendas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* LOGIN */
function toggleLogin(){
loginBox.style.display=loginBox.style.display==="block"?"none":"block";
}

function login(){
if(user.value==="INFINITY"&&pass.value==="CLIENTE"){
loginBox.style.display="none";
loginBtn.style.display="none";
adminBtn.style.display="flex";
}
}

/* ADMIN */
function toggleAdmin(){
adminPanel.classList.toggle("open");
}

/* ADD PRODUTO */
function addProduct(){
let id=db.ref("products").push().key;

let totalSeg =
(parseInt(hora.value||0)*3600)+
(parseInt(minuto.value||0)*60)+
parseInt(segundo.value||0);

db.ref("products/"+id).set({
uid:id,
vendedor:id,
produto:produto.value,
valor:valor.value,
descricao:descricao.value,
whatsapp:whats.value,
social:social.value,
estoque:parseInt(estoque.value||0),
status:"aprovado",
tempo:Date.now()+totalSeg*1000
});
}

/* ALTERAR TEMPO */
function updateTime(){
let totalSeg =
(parseInt(newHora.value||0)*3600)+
(parseInt(newMin.value||0)*60)+
parseInt(newSeg.value||0);

db.ref("products/"+uid.value).update({
tempo:Date.now()+totalSeg*1000
});
}

/* STATUS */
function updateStatus(status){
db.ref("products/"+uid.value).update({status});
}

/* DELETE */
function deleteProduct(){
db.ref("products/"+uid.value).remove();
}

/* TIMER */
function formatTime(ms){
let s=Math.floor(ms/1000);
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;
return h+":"+m+":"+sec;
}

/* RENDER */
db.ref("products").on("value",snap=>{
let html="";
snap.forEach(i=>{
let d=i.val();
if(d.status!=="aprovado") return;

let left=d.tempo-Date.now();

html+=`
<div class="card">
<b>${d.produto}</b><br>
UID: ${d.uid}<br>
Vendedor: ${d.vendedor}<br>
${d.descricao}<br>
R$ ${d.valor}<br>
WhatsApp: ${d.whatsapp}<br>
Social: ${d.social}<br>
Estoque: ${d.estoque}<br>

<div class="timer">
${left>0?formatTime(left):"Expirado"}
</div>

<button onclick="window.open('https://wa.me/${d.whatsapp}')">
Comprar
</button>
</div>`;
});
products.innerHTML=html;
});

/* ATUALIZA TEMPO VISUAL */
setInterval(()=>{},1000);
</script>

</body>
  </html>
