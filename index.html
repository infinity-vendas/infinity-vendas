<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY MARKET</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

header{
background:linear-gradient(90deg,#ff5e00,#ff9a00);
padding:14px;
text-align:center;
font-weight:bold;
}

#ticker{
background:#111;
padding:8px;
font-size:12px;
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #333;
}

#ticker span{
display:inline-block;
padding-left:100%;
animation:marquee 12s linear infinite;
color:#ff9a00;
}

@keyframes marquee{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

#products{
padding:12px;
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:#141414;
border-left:4px solid #ff7a00;
padding:12px;
border-radius:10px;
font-size:12px;
cursor:pointer;
}

.card b{color:#ff9a00;}

.small{font-size:11px;opacity:0.8}

.timer{color:#ff3b3b;font-weight:bold;margin-top:5px}

button{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:8px;
background:#ff7a00;
color:#fff;
cursor:pointer;
}

#loginBtn{
position:fixed;
bottom:15px;
right:15px;
width:45px;
height:45px;
background:#ff7a00;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

#loginBox{
position:fixed;
bottom:70px;
right:15px;
width:220px;
background:#111;
padding:10px;
border-radius:10px;
display:none;
}

#adminBtn{
position:fixed;
top:50%;
right:10px;
width:45px;
height:45px;
background:#ff7a00;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
}

#adminPanel{
position:fixed;
top:10%;
right:-380px;
width:340px;
height:80%;
background:#111;
padding:10px;
transition:0.3s;
overflow:auto;
}

#adminPanel.open{right:0;}

input,select{
width:100%;
padding:8px;
margin:5px 0;
background:#000;
border:1px solid #333;
color:#fff;
border-radius:8px;
}

.sectionTitle{
margin:10px 0;
color:#ff9a00;
font-size:13px;
}

.status{
font-size:11px;
color:#00ff88;
}

.selected{
border:2px solid #00ff88;
}
</style>
</head>

<body>

<header>INFINITY MARKET</header>

<div id="ticker">
<span>🔥 Nova plataforma já no ar ! Hotmart Style • Vendas • Ranking • Sistema Automático 🔥</span>
</div>

<div id="products"></div>

<!-- LOGIN -->
<div id="loginBtn" onclick="toggleLogin()">🔐</div>

<div id="loginBox">
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="loginAdmin()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">

<h3>PAINEL ADMIN</h3>

<input id="vendedor" placeholder="Nome vendedor">
<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">
<input id="descricao" placeholder="Descrição">

<select id="tipo">
<option>APK</option>
<option>ZIP</option>
<option>ARQUIVO</option>
</select>

<input id="whatsapp" placeholder="WhatsApp">
<input id="instagram" placeholder="Instagram">
<input id="tiktok" placeholder="TikTok">
<input id="youtube" placeholder="YouTube">
<input id="facebook" placeholder="Facebook">

<input id="tempo" placeholder="Tempo (segundos)">

<button onclick="addProduct()">Enviar para análise</button>

<hr>

<button onclick="updateStatus('aprovado')">Aprovar selecionado</button>
<button onclick="updateStatus('bloqueado')">Bloquear selecionado</button>
<button onclick="deleteProduct()">🗑 Deletar selecionado</button>

<button onclick="clearStore()">Limpar tudo</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyDX...",
authDomain:"infinity-vendas.firebaseapp.com",
databaseURL:"https://infinity-vendas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let selectedUID = null;

/* LOGIN */
function toggleLogin(){
loginBox.style.display = loginBox.style.display==="block"?"none":"block";
}

function loginAdmin(){
if(user.value==="INFINITY" && pass.value==="CLIENTE"){
loginBox.style.display="none";
loginBtn.style.display="none";
adminBtn.style.display="flex";
}else{
alert("Login inválido");
}
}

/* ADMIN PANEL */
function toggleAdmin(){
adminPanel.classList.toggle("open");
}

/* SELECT PRODUCT */
function selectProduct(uid){
selectedUID = uid;
}

/* ADD PRODUCT */
function addProduct(){
let id=db.ref("products").push().key;

db.ref("products/"+id).set({
uid:id,
vendedor:vendedor.value,
produto:produto.value,
valor:valor.value,
descricao:descricao.value,
tipo:tipo.value,
whatsapp:whatsapp.value,
instagram:instagram.value,
tiktok:tiktok.value,
youtube:youtube.value,
facebook:facebook.value,
status:"pendente",
tempo:Date.now()+(parseInt(tempo.value||3600)*1000)
});
}

/* UPDATE STATUS SEM UID MANUAL */
function updateStatus(status){
if(!selectedUID) return alert("Selecione um produto primeiro!");
db.ref("products/"+selectedUID).update({status});
}

/* DELETE SEM UID MANUAL */
function deleteProduct(){
if(!selectedUID) return alert("Selecione um produto primeiro!");
db.ref("products/"+selectedUID).remove();
selectedUID=null;
}

/* CLEAR */
function clearStore(){
db.ref("products").remove();
}

/* TIMER */
function formatTime(ms){
let s=Math.floor(ms/1000);
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;
return `${h}h ${m}m ${sec}s`;
}

/* RENDER + SELECT CLICK */
function render(){
db.ref("products").on("value",snap=>{
let html="";

snap.forEach(i=>{
let d=i.val();
let left=d.tempo-Date.now();

if(d.status!=="aprovado") return;

html+=`
<div class="card ${selectedUID===d.uid?'selected':''}" onclick="selectProduct('${d.uid}')">
<b>${d.produto}</b>
<div class="small">👤 ${d.vendedor} | UID: ${d.uid}</div>
<div>${d.descricao}</div>
<div>💰 R$ ${d.valor}</div>
<div class="status">✔ ${d.tipo}</div>
<div class="timer">${formatTime(left)}</div>

<button onclick="event.stopPropagation();window.open('https://wa.me/'+d.whatsapp)">
Comprar
</button>
</div>`;
});

products.innerHTML=html;
});
}

render();

/* TIMER LIVE (SEM BUG DE LOOP) */
setInterval(()=>{
render();
},5000);
</script>

</body>
  </html>
