<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#ff7a00;}
header{background:#111;padding:15px;text-align:center;font-size:20px;font-weight:bold;}

.marquee{
background:#000;color:#ff7a00;padding:8px;
white-space:nowrap;overflow:hidden;border-bottom:1px solid #222;
}
.marquee span{
display:inline-block;padding-left:100%;
animation:scroll 25s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{padding:15px;}

input{
width:100%;padding:10px;margin:6px 0;
border-radius:8px;border:1px solid #333;
background:#111;color:#fff;
}

.btn{
background:#ff7a00;color:#000;padding:12px;
border:none;border-radius:8px;width:100%;
cursor:pointer;font-weight:bold;
}

.card{
background:#111;padding:12px;
border-radius:10px;margin-bottom:10px;
}

.buyBtn{
background:#ff7a00;color:#000;padding:10px;
border:none;border-radius:8px;width:100%;
margin-top:8px;cursor:pointer;font-weight:bold;
}

#adminPanel{
position:fixed;top:0;right:-340px;width:320px;height:100%;
background:#111;padding:10px;transition:0.3s;
overflow:auto;z-index:9999;
}
#adminPanel.open{right:0;}

.smallBtn{
background:#333;color:#fff;padding:6px;
border:none;border-radius:6px;margin:2px;
cursor:pointer;font-size:12px;width:48%;
}

#loginBox{
position:fixed;bottom:80px;right:15px;width:220px;
background:#111;padding:10px;display:none;
border-radius:10px;z-index:9999;
}

#loginBtn{
position:fixed;bottom:15px;right:15px;width:50px;height:50px;
background:#ff7a00;border-radius:50%;
display:flex;align-items:center;justify-content:center;
cursor:pointer;font-weight:bold;color:#000;
}

#popup{
position:fixed;top:20px;left:50%;
transform:translateX(-50%);
background:#ff7a00;color:#000;padding:15px;
border-radius:10px;font-weight:bold;display:none;
width:90%;z-index:99999;text-align:center;
}
</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>

<div class="marquee">
<span>🔥 SISTEMA ATIVO • HOTMART STYLE • ADMIN PRO • WHATSAPP DIRETO ⚡</span>
</div>

<div id="popup">Adquira versão VIP ilimitado publicações ⚡</div>

<div class="container">
<h3>Produtos cadastrados</h3>
<div id="lista"></div>

<hr>

<h3>Cadastro</h3>

<input id="vendedor">
<input id="produto">
<input id="valor">
<input id="descricao">
<input id="whatsapp">

<button class="btn" onclick="enviarProduto()">ENVIAR PRODUTO</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>ADMIN PRO</h3>

<button class="smallBtn" onclick="ativarTodos()">Ativar</button>
<button class="smallBtn" onclick="desativarTodos()">Desativar</button>
<button class="smallBtn" onclick="deletarTodos()">Deletar</button>

<br><br>
<div id="adminLista"></div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button class="btn" onclick="login()">Entrar</button>
</div>

<div id="loginBtn" onclick="toggleLogin()">A</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDXDca5ZxCZKZz7lHUz4dlx0Qe6BarJSuA",
authDomain: "infinity-vendas.firebaseapp.com",
databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
projectId: "infinity-vendas",
storageBucket: "infinity-vendas.appspot.com",
messagingSenderId: "613112794080",
appId: "1:613112794080:web:acd63b723aec957b21f985"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let isAdmin=false;
let cache={};

/* LOGIN CORRIGIDO */
function login(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

auth.signInWithEmailAndPassword(email, pass)
.then(()=>{
isAdmin=true;
document.getElementById("adminPanel").classList.add("open");
})
.catch(e=>{
alert("Erro login: "+e.message);
});
}

/* ENVIAR */
function enviarProduto(){
let expire = Date.now() + (24*60*60*1000);

db.ref("products").push({
vendedor:vendedor.value,
produto:produto.value,
valor:valor.value,
descricao:descricao.value,
whatsapp:whatsapp.value,
status:"pendente",
expiresAt:expire
});
}

/* LISTA */
db.ref("products").on("value",snap=>{
cache = snap.val() || {};
render();
});

/* RENDER CORRIGIDO */
function render(){
let html="";
let adminHTML="";

for(let id in cache){
let d=cache[id];
if(!d) continue;

let tempo = countdown(d.expiresAt);

if(d.status==="aprovado"){
html+=`
<div class="card">
<b>${d.produto}</b><br>
${d.vendedor}<br>
${d.valor}<br>
${d.descricao}<br>
⏱ ${tempo}<br>
<button class="buyBtn" onclick="window.open('https://wa.me/${d.whatsapp}')">Comprar</button>
</div>`;
}

if(isAdmin){
adminHTML+=`
<div class="card">
<b>${d.produto}</b><br>
Status: ${d.status}<br>
⏱ ${tempo}<br>

<button class="smallBtn" onclick="resetar('${id}',10)">10MIN</button>
<button class="smallBtn" onclick="resetar('${id}',1)">1H</button>
<button class="smallBtn" onclick="resetar('${id}',72)">3D</button>
<button class="smallBtn" onclick="resetar('${id}',168)">7D</button>
<button class="smallBtn" onclick="resetar('${id}',336)">14D</button>
<button class="smallBtn" onclick="resetar('${id}',504)">21D</button>
<button class="smallBtn" onclick="resetar('${id}',744)">31D</button>
<button class="smallBtn" onclick="editar('${id}')">Editar</button>
<button class="smallBtn" onclick="deletar('${id}')">Deletar</button>
</div>`;
}
}

document.getElementById("lista").innerHTML=html;
document.getElementById("adminLista").innerHTML=adminHTML;
}

/* CONTADOR */
function countdown(exp){
if(!exp) return "sem tempo";

let diff = exp - Date.now();
if(diff <= 0) return "EXPIRADO ❌";

let s=Math.floor(diff/1000);
let m=Math.floor(s/60);
let h=Math.floor(m/60);

return `${h}h ${m%60}m ${s%60}s`;
}

/* RESET */
function resetar(id,hours){
let ms;

if(hours===10){
ms = 10*60*1000;
}else{
ms = hours*60*60*1000;
}

db.ref("products/"+id).update({
expiresAt: Date.now()+ms
});
}

/* EDITAR */
function editar(id){
let date=prompt("AAAA-MM-DD");
let time=prompt("HH:MM");

if(!date || !time) return;

let newExp=new Date(date+"T"+time+":00").getTime();

db.ref("products/"+id).update({
expiresAt:newExp
});
}

/* ADMIN */
function aprovar(id){db.ref("products/"+id).update({status:"aprovado"});}
function desativar(id){db.ref("products/"+id).update({status:"desativado"});}
function deletar(id){db.ref("products/"+id).remove();}

function ativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"aprovado"}));
});
}

function desativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"desativado"}));
});
}

function deletarTodos(){
db.ref("products").remove();
}

/* LOGIN TOGGLE */
function toggleLogin(){
let box=document.getElementById("loginBox");
box.style.display=box.style.display==="block"?"none":"block";
}

/* ATUALIZA TIMER */
setInterval(render,1000);

/* POPUP */
function showPopup(){
const p=document.getElementById("popup");
p.style.display="block";
setTimeout(()=>p.style.display="none",4000);
}
showPopup();
setInterval(showPopup,60000);
</script>

</body>
   </html>
