<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY NEXT LEVEL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

/* HEADER */
header{
background:#111827;
padding:16px;
text-align:center;
font-weight:bold;
}

/* PRODUCTS */
#products{
padding:15px;
display:grid;
gap:12px;
}

.card{
background:#111827;
border:1px solid #1f2937;
border-radius:12px;
padding:12px;
opacity:0.97;
}

.card b{color:#22c55e;}

/* BUTTON */
button{
width:100%;
padding:8px;
margin-top:8px;
border:none;
border-radius:8px;
background:#22c55e;
color:#000;
font-weight:bold;
cursor:pointer;
}

/* LOGIN */
#login{
position:fixed;
bottom:15px;
right:15px;
width:200px;
background:#111827;
padding:10px;
border-radius:12px;
border:1px solid #1f2937;
z-index:999;
}

/* ADMIN BUTTON */
#adminBtn{
position:fixed;
top:50%;
right:15px;
width:45px;
height:45px;
background:#22c55e;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:999;
}

/* ADMIN PANEL */
#adminPanel{
position:fixed;
top:10%;
right:-360px;
width:320px;
height:80%;
background:#111827;
border-left:2px solid #22c55e;
padding:10px;
overflow:auto;
transition:0.3s;
z-index:998;
}

#adminPanel.open{right:0;}

/* INPUTS */
input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:1px solid #374151;
background:#0b0f14;
color:#fff;
}

/* CHAT */
#chatBtn{
position:fixed;
bottom:15px;
left:15px;
width:50px;
height:50px;
background:#22c55e;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
z-index:999;
}

#chatBox{
position:fixed;
bottom:80px;
left:15px;
width:220px;
background:#111827;
border:1px solid #1f2937;
border-radius:10px;
padding:10px;
display:none;
z-index:999;
}

.chatItem{
padding:6px;
margin:5px 0;
background:#0b0f14;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

/* WHATS */
.whatsapp{
position:fixed;
bottom:15px;
right:15px;
width:45px;
height:45px;
background:#22c55e;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:999;
}

/* ADMIN MSG */
#adminMsg{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
background:#ef4444;
color:#fff;
padding:10px;
border-radius:10px;
display:none;
z-index:9999;
font-size:12px;
}
</style>
</head>

<body>

<header>INFINITY NEXT LEVEL 14.0</header>

<div id="adminMsg"></div>

<div id="products"></div>

<!-- LOGIN -->
<div id="login">
<b>ADMIN LOGIN</b>
<input id="user" placeholder="Login">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- CHAT -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatBox">
<div class="chatItem" onclick="openWhats('nao recebi produto')">📦 Não recebi produto</div>
<div class="chatItem" onclick="openWhats('produto falso')">❌ Produto falso</div>
<div class="chatItem" onclick="openWhats('reembolso')">💰 Reembolso</div>
<div class="chatItem" onclick="openWhats('parceria')">🤝 Parceiro</div>
</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">

<h3>ADMIN</h3>

<input id="vendedor" placeholder="Vendedor UID">
<input id="valor" placeholder="Valor">
<input id="produto" placeholder="Produto">
<input id="descricao" placeholder="Descrição">
<input id="whatsapp" placeholder="WhatsApp">

<button onclick="addProduct()">Enviar produto</button>

<hr>

<input id="targetUID" placeholder="Vendedor UID">
<button onclick="setStatus('aprovado')">Aprovar</button>
<button onclick="setStatus('reprovado')">Reprovar</button>

<hr>

<button onclick="resetStore()">Reset loja</button>

</div>

<div class="whatsapp">💬</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDXDca5ZxCZZ7lHUz4dlx0Qe6BarJSuA",
  authDomain: "infinity-vendas.firebaseapp.com",
  databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
  projectId: "infinity-vendas",
  storageBucket: "infinity-vendas.firebasestorage.app",
  messagingSenderId: "613112794080",
  appId: "1:613112794080:web:acd63b723aec957b21f985"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LOGIN */
function login(){
if(user.value==="ADMIN_INFINITY" && pass.value==="2026CLIENTE"){
login.style.display="none";
adminBtn.style.display="flex";
chatBtn.style.display="flex";
}else{
alert("Login inválido");
}
}

/* CHAT */
function toggleChat(){
chatBox.style.display = chatBox.style.display==="block"?"none":"block";
}

function openWhats(msg){
window.open("https://wa.me/51981528372?text="+encodeURIComponent(msg));
}

/* ADMIN */
function toggleAdmin(){
adminPanel.classList.toggle("open");
}

/* ADD */
function addProduct(){
db.ref("products").push({
vendedor:vendedor.value,
valor:valor.value,
produto:produto.value,
descricao:descricao.value,
whatsapp:whatsapp.value,
status:"pendente",
created:Date.now()
});
}

/* STATUS */
function setStatus(status){
let t = targetUID.value;

db.ref("products").once("value",snap=>{
snap.forEach(i=>{
if(i.val().vendedor==t){
i.ref.update({status});
}
});
});
}

/* RESET */
function resetStore(){
if(confirm("Apagar loja?")){
db.ref("products").remove();
}
}

/* RENDER */
db.ref("products").on("value",snap=>{
let html="";

snap.forEach(i=>{
let d=i.val();
if(d.status !== "aprovado") return;

html+=`
<div class="card">
<b>${d.produto}</b><br>
${d.descricao}<br>
R$ ${d.valor}<br>
Vendedor: ${d.vendedor}<br>

<button onclick="window.open('https://wa.me/'+d.whatsapp)">
Comprar
</button>
</div>`;
});

products.innerHTML=html;
});
</script>

</body>
  </html>
