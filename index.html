<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY AJUDAAI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
color:#ff7a00;
}

/* HEADER */
header{
background:#ff7a00;
color:#fff;
padding:14px;
text-align:center;
font-weight:bold;
}

/* TICKER */
#ticker{
background:#fff3e6;
padding:10px;
font-size:12px;
white-space:nowrap;
overflow:hidden;
border-bottom:2px solid #ff7a00;
}

#ticker span{
display:inline-block;
padding-left:100%;
animation:marquee 12s linear infinite;
color:#ff7a00;
font-weight:bold;
}

@keyframes marquee{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* AVISO */
#warning{
text-align:center;
padding:10px;
font-weight:bold;
color:#ff7a00;
}

/* SEÇÕES */
.section{
padding:10px;
border-bottom:1px solid #eee;
}

.title{
font-weight:bold;
margin-bottom:8px;
}

/* CARD */
.card{
border:1px solid #ff7a00;
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-size:12px;
}

/* CHAT */
#chat{
position:fixed;
bottom:15px;
right:15px;
width:55px;
height:55px;
background:#25d366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
opacity:0.98;
font-size:22px;
}

#chatBox{
position:fixed;
bottom:80px;
right:15px;
width:220px;
background:#fff;
border:1px solid #ff7a00;
padding:10px;
display:none;
}

.chatItem{
padding:6px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* ADMIN */
#adminPanel{
position:fixed;
top:10%;
right:10px;
width:250px;
background:#fff;
border:2px solid #ff7a00;
padding:10px;
display:none;
}

input,button{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ff7a00;
border-radius:6px;
}

/* LOGIN FLUTUANTE */
#loginBox{
position:fixed;
top:20px;
right:20px;
width:180px;
background:#fff;
border:2px solid #ff7a00;
padding:10px;
border-radius:10px;
opacity:0.98;
z-index:9999;
font-size:12px;
}

/* COMMENTS */
.comment{
font-size:11px;
padding:4px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<header>INFINITY HOTMARKET</header>

<div id="ticker">
<span>🔥 Adquira plano Ultra VIP ilimitado • 24h online • Sistema seguro • Hotmarket Style 🔥</span>
</div>

<div id="warning">
⚡ Venha adquirir versão VIP ilimitada ⚡ seu site 24h on-line
</div>

<!-- PRODUTOS -->
<div class="section">
<div class="title">📦 Produtos Free Online</div>
<div id="free"></div>
</div>

<div class="section">
<div class="title">💎 Produtos VIP Online</div>
<div id="vip"></div>
</div>

<!-- COMENTÁRIOS -->
<div class="section">
<div class="title">💬 Comentários</div>
<div id="comments"></div>
</div>

<!-- CHAT -->
<div id="chat" onclick="toggleChat()">💬</div>

<div id="chatBox">
<div class="chatItem" onclick="goWhats()">Suporte</div>
<div class="chatItem" onclick="goWhats()">Problema cadastro</div>
<div class="chatItem" onclick="goWhats()">Denunciar vendedor</div>
</div>

<!-- LOGIN FLUTUANTE -->
<div id="loginBox">
<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password" placeholder="Senha">
<button onclick="loginAdmin()">Entrar</button>
</div>

<!-- ADMIN -->
<button onclick="toggleAdmin()">ADMIN</button>

<div id="adminPanel">

<h3>ADMIN</h3>

<input id="vendedor" placeholder="Vendedor">
<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">
<input id="descricao" placeholder="Descrição">
<input id="whatsapp" placeholder="WhatsApp">

<select id="tipo">
<option>FREE</option>
<option>VIP</option>
</select>

<button onclick="addProduct()">Enviar para análise</button>
<button onclick="approve()">Aprovar UID</button>
<button onclick="remove()">Deletar</button>
<button onclick="block()">Bloquear</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyDX...",
authDomain:"infinity-vendas.firebaseapp.com",
databaseURL:"https://infinity-vendas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* LOGIN ADMIN */
function loginAdmin(){
if(loginUser.value==="INFINITY" && loginPass.value==="CLIENTE"){
document.getElementById("adminPanel").style.display="block";
alert("Acesso liberado");
}else{
alert("Login inválido");
}
}

/* CHAT */
function toggleChat(){
chatBox.style.display = chatBox.style.display==="block"?"none":"block";
}

function goWhats(){
window.open("https://wa.me/51981528372?text=Suporte INFINITY HOTMARKET");
}

/* ADMIN */
function toggleAdmin(){
adminPanel.style.display="block";
}

/* ADD */
function addProduct(){
let id=db.ref("products").push().key;

db.ref("products/"+id).set({
uid:id,
vendedor:vendedor.value,
produto:produto.value,
valor:valor.value,
descricao:descricao.value,
whatsapp:whatsapp.value,
tipo:tipo.value,
status:"pendente"
});
}

/* APPROVE */
function approve(){
db.ref("products/"+uid.value).update({status:"aprovado"});
}

/* REMOVE */
function remove(){
db.ref("products/"+uid.value).remove();
}

/* BLOCK */
function block(){
db.ref("products/"+uid.value).update({status:"bloqueado"});
}

/* RENDER */
db.ref("products").on("value",snap=>{
let freeHTML="";
let vipHTML="";

snap.forEach(i=>{
let d=i.val();
if(d.status!=="aprovado") return;

let card=`
<div class="card">
UID: ${d.uid}<br>
Vendedor: ${d.vendedor}<br>
Valor: R$ ${d.valor}<br>
WhatsApp: ${d.whatsapp}
</div>`;

if(d.tipo==="FREE") freeHTML+=card;
if(d.tipo==="VIP") vipHTML+=card;
});

document.getElementById("free").innerHTML=freeHTML;
document.getElementById("vip").innerHTML=vipHTML;
});

/* COMMENTS */
const comments=["🔥 ótimo","💰 vende muito","🚀 perfeito","⭐ top demais","⚡ recomendo"];

setInterval(()=>{
let c=document.createElement("div");
c.className="comment";
c.innerText=comments[Math.floor(Math.random()*comments.length)];
document.getElementById("comments").prepend(c);

if(document.getElementById("comments").children.length>100){
document.getElementById("comments").lastChild.remove();
}
},2000);

</script>

</body>
  </html>
