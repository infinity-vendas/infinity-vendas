<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body { margin:0; font-family:Arial; background:#000; color:#ff7a00; }

header {
background:#111;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.marquee {
background:#000;
padding:8px;
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #222;
}

.marquee span {
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite, colorChange 2s infinite;
font-weight:bold;
}

@keyframes scroll {
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

@keyframes colorChange {
0% { color:#ff7a00; }
50% { color:#ff0000; }
100% { color:#ff7a00; }
}

.container{padding:15px;}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #333;
background:#111;
color:#fff;
}

.btn{
background:#ff7a00;
color:#000;
padding:12px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.buyBtn{
background:#25D366;
color:#fff;
padding:8px;
border:none;
border-radius:6px;
margin-top:5px;
cursor:pointer;
font-weight:bold;
width:100%;
}

.timer{
color:#fff;
font-size:13px;
margin-top:5px;
}

/* PIX */
#pixBox{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
border:2px solid #ff7a00;
padding:15px;
border-radius:10px;
z-index:999999;
display:none;
text-align:center;
width:90%;
max-width:320px;
}

#pixBox img{
width:100%;
border-radius:10px;
margin:10px 0;
border:2px solid #ff7a00;
}

#pixTimer{
color:red;
font-weight:bold;
margin:5px 0;
}

.pixActions{
display:flex;
gap:5px;
margin-top:10px;
}

.pixActions button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.closeBtn{background:red;color:#fff;}
.instaBtn{background:#E1306C;color:#fff;}
.confirmBtn{background:#00c853;color:#fff;}

/* ADMIN PANEL (CORRIGIDO) */
#adminPanel{
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#111;
padding:10px;
overflow:auto;
z-index:1000; /* não tampa mais tudo */
border-left:2px solid #ff7a00;
transition:0.3s;
}

/* minimizado */
#adminPanel.minimizado{
width:60px;
padding:5px;
overflow:hidden;
}

/* botão flutuante */
#adminToggle{
position:fixed;
top:10px;
right:10px;
background:#ff7a00;
color:#000;
border:none;
padding:10px;
border-radius:50%;
font-weight:bold;
cursor:pointer;
z-index:1001;
}

.smallBtn{
background:#333;
color:#fff;
padding:6px;
border:none;
border-radius:6px;
margin:2px;
cursor:pointer;
font-size:11px;
width:48%;
}

.adminHeader{
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>

<div class="marquee">
<span>⚡ Adquira versão VIP ilimitadas! Seus produtos online 24h ⚡ WhatsApp: 51981528372</span>
</div>

<!-- BOTÃO FLUTUANTE ADMIN -->
<button id="adminToggle" onclick="toggleAdmin()">☰</button>

<!-- PIX BOX -->
<div id="pixBox">
<h3>💰 PAGAMENTO PIX</h3>

<img src="https://raw.githubusercontent.com/infinity-vendas/infinity-vendas/main/Screenshot_20260417-042120-1.png">

<p><b>PIX:</b> 51981528372</p>
<p><b>Nome:</b> RAPHAEL DE MATOS</p>

<div id="pixTimer">02:00</div>

<p id="pixInfo"></p>

<div class="pixActions">
<button class="instaBtn" onclick="window.open('https://instagram.com/infinity_cliente_oficial','_blank')">
Instagram
</button>

<button class="closeBtn" onclick="fecharPix()">Fechar</button>
</div>

<button class="confirmBtn" onclick="confirmarPagamento()">
Confirmar pagamento
</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<div class="adminHeader">
<span>ADMIN</span>
<button onclick="toggleAdmin()">—</button>
</div>
<div id="adminLista"></div>
</div>

<div class="container">

<h3>Produtos cadastrados</h3>
<div id="lista">Carregando...</div>

<hr>

<h3>Cadastro</h3>

<input id="vendedor" placeholder="Nome vendedor">
<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">
<input id="descricao" placeholder="Descrição">
<input id="whatsapp" placeholder="WhatsApp">

<button class="btn" onclick="enviarProduto()">ENVIAR PRODUTO</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDXDca5ZxCZKZz7lHUz4dlx0Qe6BarJSuA",
authDomain: "infinity-vendas.firebaseapp.com",
databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
projectId: "infinity-vendas"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cache={};
let pixInterval;
let pixTime = 120;

/* ADMIN TOGGLE */
function toggleAdmin(){
document.getElementById("adminPanel").classList.toggle("minimizado");
}

/* ENVIAR */
function enviarProduto(){
let expire = Date.now() + (24*60*60*1000);

db.ref("products").push({
vendedor:vendedor.value,
produto:produto.value,
valor:valor.value,
descricao:descricao.value,
whatsapp:(whatsapp.value||"").replace(/\D/g,''),
status:"pendente",
expiresAt:expire,
vendas:0
});
}

/* LISTA */
db.ref("products").on("value",snap=>{
cache = snap.val() || {};
render();
renderAdmin();
});

/* CLIENT */
function render(){
let html="";
for(let id in cache){
let d=cache[id];
if(!d || d.status!=="aprovado") continue;

html+=`
<div class="card">
<b>⚡ ${d.vendedor}</b><br>
📦 ${d.produto}<br>
💰 R$ ${d.valor}<br>
📝 ${d.descricao}<br>
<div class="timer" id="t_${id}"></div>

<button class="buyBtn" onclick="abrirPix('${id}','${d.valor}','${d.produto}')">
📲 Adquirir
</button>
</div>`;
}
lista.innerHTML = html || "<div class='card'>Nenhum produto ativo ⚠️</div>";
}

/* ADMIN */
function renderAdmin(){
let html="";
for(let id in cache){
let d=cache[id];
if(!d) continue;

html+=`
<div class="card">
<b>${d.produto}</b><br>
Status: ${d.status}<br>

<button class="smallBtn" onclick="aprovar('${id}')">Aprovar</button>
<button class="smallBtn" onclick="reset('${id}',12)">12h</button>
<button class="smallBtn" onclick="reset('${id}',24)">24h</button>
<button class="smallBtn" onclick="resetDay('${id}',7)">7d</button>
<button class="smallBtn" onclick="resetDay('${id}',14)">14d</button>
<button class="smallBtn" onclick="resetDay('${id}',21)">21d</button>
<button class="smallBtn" onclick="resetDay('${id}',31)">31d</button>
<button class="smallBtn" onclick="deletar('${id}')">Deletar</button>
</div>`;
}
adminLista.innerHTML = html;
}

/* FUNÇÕES ADMIN */
function aprovar(id){
db.ref("products/"+id).update({status:"aprovado"});
}

function deletar(id){
db.ref("products/"+id).remove();
}

function reset(id,h){
db.ref("products/"+id).update({
expiresAt: Date.now() + h*60*60*1000
});
}

function resetDay(id,d){
db.ref("products/"+id).update({
expiresAt: Date.now() + d*24*60*60*1000
});
}

/* PIX */
function abrirPix(id,valor,produto){
document.getElementById("pixInfo").innerHTML =
"Produto: "+produto+"<br>Valor: R$ "+valor;

pixBox.style.display="block";

pixTime=120;
clearInterval(pixInterval);

pixInterval=setInterval(()=>{
pixTime--;
let m=Math.floor(pixTime/60);
let s=pixTime%60;

pixTimer.innerHTML=`⏳ ${m}:${s<10?"0"+s:s}`;

if(pixTime<=0){
fecharPix();
clearInterval(pixInterval);
}
},1000);
}

function fecharPix(){
pixBox.style.display="none";
clearInterval(pixInterval);
}

function confirmarPagamento(){
alert("Pagamento enviado!");
fecharPix();
}

/* TIMER */
function atualizarTempos(){
for(let id in cache){
let d=cache[id];
if(!d || d.status!=="aprovado") continue;

let el=document.getElementById("t_"+id);
if(!el) continue;

let diff=d.expiresAt-Date.now();

if(diff<=0){
el.innerHTML="EXPIRADO";
continue;
}

let s=Math.floor(diff/1000);
let m=Math.floor(s/60);
let h=Math.floor(m/60);

el.innerHTML=`⏱ ${h}h ${m%60}m ${s%60}s`;
}
}

setInterval(atualizarTempos,1000);
</script>

</body>
  </html>
