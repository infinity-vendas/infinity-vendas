<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body { margin:0; font-family:Arial; background:#000; color:#ff7a00; }

header {
background:#111;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.marquee {
background:#000;
padding:8px;
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #222;
}

.marquee span {
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite, colorChange 2s infinite;
font-weight:bold;
}

@keyframes scroll {
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

@keyframes colorChange {
0% { color:#ff7a00; }
50% { color:#ff0000; }
100% { color:#ff7a00; }
}

.container{padding:15px;}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #333;
background:#111;
color:#fff;
}

.btn{
background:#ff7a00;
color:#000;
padding:12px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.buyBtn{
background:#25D366;
color:#fff;
padding:8px;
border:none;
border-radius:6px;
margin-top:5px;
cursor:pointer;
font-weight:bold;
width:100%;
}

.timer{
color:#fff;
font-size:13px;
margin-top:5px;
}

/* ADMIN FLUTUANTE (CORRIGIDO) */
#adminPanel{
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:rgba(20,20,20,0.98);
backdrop-filter:blur(10px);
padding:10px;
overflow:auto;
z-index:99999;
border-left:2px solid #ff7a00;
display:none;
box-shadow:-5px 0 20px rgba(0,0,0,0.6);
}

/* BOTÃO ADMIN */
#adminToggle{
position:fixed;
bottom:15px;
left:15px;
background:linear-gradient(145deg,#ff7a00,#ff5500);
color:#000;
border:none;
padding:14px;
border-radius:50%;
font-weight:bold;
cursor:pointer;
z-index:100000;
}

/* BOTÕES ADMIN */
.smallBtn{
background:#333;
color:#fff;
padding:6px;
border:none;
border-radius:6px;
margin:2px;
cursor:pointer;
font-size:11px;
width:48%;
}

.smallBtn:hover{
background:#ff7a00;
color:#000;
}

/* FECHAR ADMIN */
.closeBtn{
background:red;
color:#fff;
padding:10px;
border:none;
border-radius:8px;
width:100%;
margin-bottom:10px;
cursor:pointer;
font-weight:bold;
}

/* LOGIN */
#loginBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999999;
}

.loginCard{
background:#111;
padding:20px;
border-radius:10px;
width:90%;
max-width:300px;
}

/* QR CODE */
.qrBox{
background:#111;
margin:15px 0;
padding:15px;
border-radius:10px;
text-align:center;
}

.qrBox img{
width:100%;
max-width:260px;
border-radius:10px;
}
</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>

<div class="marquee">
<span>⚡ Produtos online 24h | Sistema automático Infinity ⚡ WhatsApp: 51981528372</span>
</div>

<!-- LOGIN -->
<div id="loginBox">
<div class="loginCard">
<h3>LOGIN ADMIN</h3>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button class="btn" onclick="login()">ENTRAR</button>
</div>
</div>

<button id="adminToggle" onclick="toggleAdmin()">☰</button>

<div id="adminPanel">
<button class="closeBtn" onclick="toggleAdmin()">FECHAR</button>
<div id="adminLista"></div>
</div>

<div class="container">

<h3>Produtos cadastrados em nosso sistema em tempo real:</h3>
<div id="lista">Carregando...</div>

<!-- QR CODE ADICIONADO -->
<div class="qrBox">
<h3>Pagamento PIX</h3>
<img src="https://raw.githubusercontent.com/infinity-vendas/infinity-vendas/refs/heads/main/Screenshot_20260417-042120-1.png" alt="QR Code PIX">
<p>Chave PIX: <b>SUA-CHAVE-AQUI</b></p>
</div>

<hr>

<h3>Cadastro</h3>

<input id="vendedor" placeholder="Vendedor">
<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">
<input id="descricao" placeholder="Descrição">
<input id="instagram" placeholder="Instagram @">
<input id="whatsapp" placeholder="WhatsApp">

<button class="btn" onclick="enviarProduto()">ENVIAR PRODUTO</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDXDca5ZxCZKZz7lHUz4dlx0Qe6BarJSuA",
authDomain: "infinity-vendas.firebaseapp.com",
databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
projectId: "infinity-vendas"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let cache = {};
let adminLogado = false;

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(email.value, senha.value)
.then(()=>{
adminLogado = true;
loginBox.style.display="none";
});
}

/* LOGOUT */
function logout(){
auth.signOut();
adminLogado = false;
loginBox.style.display="flex";
adminPanel.style.display="none";
}

/* AUTH */
auth.onAuthStateChanged(user=>{
adminLogado = !!user;
loginBox.style.display = user ? "none" : "flex";
});

/* TOGGLE ADMIN */
function toggleAdmin(){
if(!adminLogado){
alert("Faça login primeiro!");
return;
}
adminPanel.style.display = (adminPanel.style.display==="block")?"none":"block";
}

/* ENVIAR */
function enviarProduto(){
db.ref("products").push({
vendedor:vendedor.value,
produto:produto.value,
valor:valor.value,
descricao:descricao.value,
instagram:instagram.value,
whatsapp:whatsapp.value.replace(/\D/g,''),
status:"pendente",
expiresAt: Date.now() + 86400000
});
}

/* FIREBASE */
db.ref("products").on("value",snap=>{
cache = snap.val() || {};
render();
renderAdmin();
});

/* CLIENT */
function render(){
let html="";
for(let id in cache){
let d=cache[id];
if(!d || d.status!=="aprovado") continue;

html+=`
<div class="card">
<b>${d.vendedor}</b><br>
📦 ${d.produto}<br>
💰 R$ ${d.valor}<br>
📝 ${d.descricao}<br>
📸 ${d.instagram}<br>
📱 ${d.whatsapp}<br>
<div class="timer" id="t_${id}"></div>
<button class="buyBtn">Adquirir</button>
</div>`;
}
lista.innerHTML = html || "<div class='card'>Nenhum produto ativo ⚠️</div>";
}

/* ADMIN */
function renderAdmin(){
if(!adminLogado) return;

let html="";
for(let id in cache){
let d=cache[id];
if(!d) continue;

html+=`
<div class="card">
<b>${d.produto}</b><br>
Status: ${d.status}<br>

<button class="smallBtn" onclick="aprovar('${id}')">OK</button>
<button class="smallBtn" onclick="reset('${id}',12)">12h</button>
<button class="smallBtn" onclick="reset('${id}',24)">24h</button>
<button class="smallBtn" onclick="deletar('${id}')">Del</button>
</div>`;
}
adminLista.innerHTML = html;
}

/* FUNÇÕES ADMIN */
function aprovar(id){
db.ref("products/"+id).update({status:"aprovado"});
}

function deletar(id){
db.ref("products/"+id).remove();
}

function reset(id,h){
db.ref("products/"+id).update({
expiresAt: Date.now() + (h*60*60*1000)
});
}

/* TIMER */
function atualizarTempos(){
for(let id in cache){
let d=cache[id];
if(!d || d.status!=="aprovado") continue;

let el=document.getElementById("t_"+id);
if(!el) continue;

let diff=d.expiresAt-Date.now();
if(diff<=0){ el.innerHTML="EXPIRADO"; continue; }

let s=Math.floor(diff/1000);
let m=Math.floor(s/60);
let h=Math.floor(m/60);

el.innerHTML=`⏱ ${h}h ${m%60}m ${s%60}s`;
}
}
setInterval(atualizarTempos,1000);
</script>

</body>
  </html>
