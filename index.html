<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY VENDAS ON-LINE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#ff2e2e;
}

/* HEADER */
header{
background:#8b0000;
color:#fff;
padding:15px;
text-align:center;
font-weight:bold;
}

/* AVISO */
#notice{
padding:10px;
background:#111;
border-bottom:1px solid red;
font-size:12px;
}

/* PRODUTOS */
#products{
padding:10px;
display:grid;
gap:10px;
}

.card{
background:#111;
border-left:4px solid red;
padding:10px;
border-radius:6px;
font-size:12px;
}

.aprovado{border-color:#00ff55;}
.pendente{border-color:orange;}
.reprovado{border-color:red;opacity:0.5;}

/* ADMIN BUTTON */
#adminBtn{
position:fixed;
top:50%;
right:10px;
width:45px;
height:45px;
background:red;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#fff;
z-index:999;
}

/* ADMIN PANEL */
#adminPanel{
position:fixed;
top:10%;
right:-360px;
width:340px;
height:80%;
background:#0a0a0a;
border-left:2px solid red;
padding:10px;
overflow:auto;
transition:0.4s;
z-index:998;
}
#adminPanel.open{right:0;}

/* INPUTS */
input,button{
width:100%;
padding:7px;
margin:4px 0;
background:#000;
color:#ff4d4d;
border:1px solid red;
font-size:12px;
}

button{
background:red;
color:#fff;
cursor:pointer;
}

/* LOGIN */
#login{
position:fixed;
bottom:70px;
right:10px;
width:200px;
background:#111;
border:1px solid red;
border-radius:12px;
padding:10px;
z-index:1000;
}

/* CHAT */
#chatSupport{
position:fixed;
bottom:120px;
right:10px;
width:200px;
background:#111;
border:1px solid red;
border-radius:12px;
padding:10px;
z-index:1000;
}

.chatBtn{
width:100%;
margin:3px 0;
padding:5px;
font-size:11px;
background:#000;
border:1px solid red;
color:#fff;
cursor:pointer;
}

/* WHATS */
.whatsapp{
position:fixed;
bottom:10px;
right:10px;
width:40px;
height:40px;
background:red;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:#fff;
opacity:0.7;
cursor:pointer;
z-index:999;
}

/* ALERTA ADMIN */
#adminMsg{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
background:#ff0000;
color:#fff;
padding:10px;
border-radius:8px;
font-size:12px;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<div id="adminMsg"></div>

<!-- AVISO -->
<div id="notice">
⚡ INFINITY VENDAS ⚡<br>
Venda segura e confiável<br>
Plataforma 2026 🚀
</div>

<header>🔥 INFINITY VENDAS ON-LINE 🔥</header>

<div id="products"></div>

<!-- LOGIN -->
<div id="login">
<b>LOGIN ADMIN</b>
<input id="user" placeholder="Login">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- CHAT -->
<div id="chatSupport">
<b>SUPORTE</b>

<button class="chatBtn" onclick="openWhats('compre e não recebi o produto')">
📦 Não recebi produto
</button>

<button class="chatBtn" onclick="openWhats('recebi produto falso')">
❌ Produto falso
</button>

<button class="chatBtn" onclick="openWhats('solicitar reembolso')">
💰 Reembolso
</button>

<button class="chatBtn" onclick="openWhats('quero ser parceiro INFINITY')">
🤝 Parceiro INFINITY
</button>
</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">

<h3>ADMIN PAINEL</h3>

<input id="vendedor" placeholder="Vendedor UID">
<input id="valor" placeholder="Valor">
<input id="produto" placeholder="Produto">
<input id="descricao" placeholder="Descrição">
<input id="whatsapp" placeholder="WhatsApp">

<button onclick="addProduct()">Enviar (PENDENTE)</button>

<hr>

<h4>MODERAÇÃO</h4>
<input id="targetUID" placeholder="Vendedor UID">

<button onclick="setStatus('aprovado')">✔️ Aprovar</button>
<button onclick="setStatus('reprovado')">❌ Reprovar</button>

<hr>

<h4>🚫 BAN SYSTEM</h4>
<input id="banUID" placeholder="Banir UID">

<button onclick="banUser()">Banir vendedor</button>
<button onclick="unbanUser()">Desbanir vendedor</button>

<hr>

<h4>🗑 RESET LOJA</h4>
<button onclick="resetStore()">Resetar produtos</button>

</div>

<div class="whatsapp">💬</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDXDca5ZxCZZ7lHUz4dlx0Qe6BarJSuA",
  authDomain: "infinity-vendas.firebaseapp.com",
  databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
  projectId: "infinity-vendas",
  storageBucket: "infinity-vendas.firebasestorage.app",
  messagingSenderId: "613112794080",
  appId: "1:613112794080:web:acd63b723aec957b21f985"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LOGIN */
function login(){
if(user.value==="INFINITY" && pass.value==="CLIENTE"){
login.style.display="none";
}else{
alert("Login inválido");
}
}

/* WHATS */
function openWhats(msg){
window.open("https://wa.me/51981528372?text="+encodeURIComponent(msg));
}

/* BAN SYSTEM */
function banUser(){
db.ref("banned/"+banUID.value).set({banned:true});
alert("Vendedor banido");
}

function unbanUser(){
db.ref("banned/"+banUID.value).remove();
alert("Vendedor liberado");
}

function checkBan(uid,cb){
db.ref("banned/"+uid).once("value",snap=>{
cb(!snap.exists());
});
}

/* ADD PRODUCT */
function addProduct(){

checkBan(vendedor.value,(ok)=>{
if(!ok){
alert("Vendedor BANIDO!");
return;
}

db.ref("products").push({
vendedor:vendedor.value,
valor:valor.value,
produto:produto.value,
descricao:descricao.value,
whatsapp:whatsapp.value,
status:"pendente",
created:Date.now()
});

alert("Produto enviado!");
});

}

/* STATUS */
function setStatus(status){
let t = targetUID.value;

db.ref("products").once("value",snap=>{
snap.forEach(i=>{
if(i.val().vendedor==t){
i.ref.update({status});
}
});
});
}

/* RESET */
function resetStore(){
if(confirm("Apagar tudo?")){
db.ref("products").remove();
}
}

/* AVISO ADMIN */
db.ref("warnings").on("value",snap=>{
snap.forEach(i=>{
adminMsg.innerText = i.val().msg;
adminMsg.style.display="block";

setTimeout(()=>{
adminMsg.style.display="none";
},60000);
});
});

/* RENDER */
db.ref("products").on("value",snap=>{
let html="";

snap.forEach(i=>{
let d=i.val();

if(d.status !== "aprovado") return;

html+=`
<div class="card aprovado">
<b>${d.produto}</b><br>
${d.descricao}<br>
R$ ${d.valor}<br>
Vendedor: ${d.vendedor}<br>

<button onclick="window.open('https://wa.me/'+d.whatsapp)">
Adquirir produto
</button>
</div>`;
});

products.innerHTML=html;
});
</script>

</body>
  </html>
