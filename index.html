<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY AJUDA.AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#ff7a00;
}

/* HEADER */
header{
background:#111;
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

/* LETREIRO */
#ticker{
background:#000;
color:#ff7a00;
overflow:hidden;
white-space:nowrap;
font-size:13px;
border-bottom:1px solid #222;
}

#ticker span{
display:inline-block;
padding-left:100%;
animation:marquee 10s linear infinite;
}

@keyframes marquee{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* CONTAINER */
.container{
padding:12px;
}

/* FORM */
input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:1px solid #333;
background:#111;
color:#fff;
}

/* BUTTON */
.btn{
background:green;
color:#fff;
padding:10px;
border:none;
border-radius:8px;
width:100%;
margin-top:5px;
cursor:pointer;
}

/* PRODUTOS */
.card{
background:#111;
padding:10px;
border-radius:10px;
border-left:4px solid #ff7a00;
margin-bottom:10px;
}

/* ADMIN */
#adminBtn{
position:fixed;
top:50%;
right:10px;
width:45px;
height:45px;
background:#ff7a00;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
}

#adminPanel{
position:fixed;
top:10%;
right:-300px;
width:260px;
height:80%;
background:#111;
padding:10px;
transition:0.3s;
overflow:auto;
}

#adminPanel.open{right:0;}

/* LOGIN */
#loginBtn{
position:fixed;
bottom:15px;
right:15px;
width:45px;
height:45px;
background:#ff7a00;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#loginBox{
position:fixed;
bottom:70px;
right:15px;
width:200px;
background:#111;
padding:10px;
display:none;
border-radius:10px;
}

/* ALERT */
#alertBox{
position:fixed;
top:20%;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #00ff55;
display:none;
z-index:999;
color:#fff;
text-align:center;
}
</style>
</head>

<body>

<header>INFINITY AJUDA.AI</header>

<div id="ticker">
<span>Infinity ajuda.ai.com • Plataforma de divulgação profissional • Sistema estilo Hotmart</span>
</div>

<div class="container">

<h3>Cadastre-se produto aqui:</h3>

<input id="vendedor" placeholder="⚡ vendedor">
<input id="produto" placeholder="⚡ produto">
<input id="valor" placeholder="⚡ valor">
<input id="descricao" placeholder="⚡ descrição">
<input id="whatsapp" placeholder="⚡ whatsapp">

<button class="btn" onclick="enviarProduto()">Enviar pedido</button>

<hr>

<h3>Produtos cadastrados em nossa base:</h3>

<div id="lista"></div>

</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">
<h3>ADMIN</h3>
<input id="uid" placeholder="UID produto">
<button onclick="updateStatus('aprovado')">Ativar</button>
<button onclick="updateStatus('desativado')">Desativar</button>
<button onclick="deleteProduct()">Deletar</button>
</div>

<!-- LOGIN -->
<div id="loginBtn" onclick="toggleLogin()">🔐</div>

<div id="loginBox">
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- ALERT -->
<div id="alertBox"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyDX...",
authDomain:"infinity-vendas.firebaseapp.com",
databaseURL:"https://infinity-vendas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* INPUTS */
const vendedor = document.getElementById("vendedor");
const produto = document.getElementById("produto");
const valor = document.getElementById("valor");
const descricao = document.getElementById("descricao");
const whatsapp = document.getElementById("whatsapp");

/* SPAM */
let envioCount = 0;

/* ALERT FIXO */
function showAlert(msg){
let box=document.getElementById("alertBox");
box.innerHTML = `
${msg}<br><br>
<button onclick="fecharAlert()" style="padding:6px;border:none;background:#00ff55;border-radius:6px;cursor:pointer;">Fechar</button>
`;
box.style.display="block";
}

function fecharAlert(){
document.getElementById("alertBox").style.display="none";
}

/* ENVIAR */
function enviarProduto(){

envioCount++;

/* VALIDAÇÃO TOTAL */
if(
!vendedor.value.trim() ||
!produto.value.trim() ||
!valor.value.trim() ||
!descricao.value.trim() ||
!whatsapp.value.trim()
){
showAlert("Preencha TODOS os campos!");
return;
}

let id=db.ref("products").push().key;

db.ref("products/"+id).set({
uid:id,
vendedor:vendedor.value.trim(),
produto:produto.value.trim(),
valor:valor.value.trim(),
descricao:descricao.value.trim(),
whatsapp:whatsapp.value.trim(),
status:"pendente"
});

/* LIMPAR */
vendedor.value="";
produto.value="";
valor.value="";
descricao.value="";
whatsapp.value="";

/* ALERTAS */
if(envioCount === 1){
showAlert("Produto enviado ✔️<br><br>⚠️ 1/3 Evite spam!");
}
else if(envioCount === 2){
showAlert("⚠️ 2/3 Atenção com spam!");
}
else{
showAlert("🚫 3/3 Último aviso! Pode ser bloqueado.");
}
}

/* LOGIN */
function toggleLogin(){
loginBox.style.display=loginBox.style.display==="block"?"none":"block";
}

function login(){
if(user.value==="INFINITY" && pass.value==="CLIENTE"){
loginBox.style.display="none";
adminBtn.style.display="flex";
}else{
alert("Login inválido");
}
}

/* ADMIN */
function toggleAdmin(){
adminPanel.classList.toggle("open");
}

function updateStatus(status){
db.ref("products/"+uid.value).update({status});
showAlert("Status atualizado!");
}

function deleteProduct(){
db.ref("products/"+uid.value).remove();
showAlert("Produto deletado!");
}

/* LISTA FINAL CORRIGIDA */
db.ref("products").on("value",snap=>{

if(!snap.exists()){
document.getElementById("lista").innerHTML = "Nenhum produto disponível no momento.";
return;
}

let html="";

snap.forEach(i=>{
let d=i.val();

if(
!d ||
d.status!=="aprovado" ||
!d.vendedor ||
!d.produto
){
return;
}

html+=`
<div class="card">
⚡ vendedor: ${d.vendedor}<br>
⚡ produto: ${d.produto}<br>
⚡ valor: R$ ${d.valor}<br>
⚡ descrição: ${d.descricao}<br>
⚡ whatsapp: ${d.whatsapp}
</div>`;
});

if(html===""){
html="Nenhum produto aprovado ainda.";
}

document.getElementById("lista").innerHTML=html;

});
</script>

</body>
  </html>
