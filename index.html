<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#ff7a00;}
header{background:#111;padding:15px;text-align:center;font-size:20px;font-weight:bold;}

.marquee {
background:#000;
color:#ff7a00;
padding:8px;
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #222;
}
.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{padding:15px;}

.notice{
background:#111;
padding:10px;
border-radius:10px;
border-left:4px solid #ff7a00;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #333;
background:#111;
color:#fff;
}

.btn{
background:red;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

button{cursor:pointer;}

#loginBtn{
position:fixed;
bottom:15px;
right:15px;
width:50px;
height:50px;
background:#ff7a00;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

#adminBtn{
position:fixed;
top:50%;
right:10px;
width:50px;
height:50px;
background:red;
border-radius:50%;
display:none;
}

#adminPanel{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
overflow:auto;
}

#adminPanel.open{right:0;}

#loginBox{
position:fixed;
bottom:80px;
right:15px;
width:220px;
background:#111;
padding:10px;
display:none;
border-radius:10px;
}
</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>

<div class="marquee">
<span>Site oficial Infinity Divulgações ⚡</span>
</div>

<div class="container">

<div class="notice">Seja Bem-vindo</div>

<h3>Produtos cadastrados</h3>
<div id="lista"></div>

<hr>

<h3>Cadastro</h3>

<input id="vendedor" placeholder="vendedor">
<input id="produto" placeholder="produto">
<input id="descricao" placeholder="descrição">
<input id="valor" placeholder="valor">
<input id="whatsapp" placeholder="whatsapp">
<input id="instagram" placeholder="instagram">

<button class="btn" onclick="enviarProduto()">ENVIAR SOLICITAÇÃO</button>

</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="toggleAdmin()">A</div>

<div id="adminPanel">
<h3>ADMIN</h3>

<button onclick="ativarTodos()">Ativar todos</button>
<button onclick="desativarTodos()">Desativar todos</button>
<button onclick="deletarTodos()">Deletar todos</button>

<div id="adminLista"></div>
</div>

<!-- LOGIN -->
<div id="loginBtn" onclick="toggleLogin()">L</div>

<div id="loginBox">
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSyDX...",
authDomain:"infinity-vendas.firebaseapp.com",
databaseURL:"https://infinity-vendas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ELEMENTOS */
const lista = document.getElementById("lista");
const adminLista = document.getElementById("adminLista");
const loginBox = document.getElementById("loginBox");

let isAdmin = false;

/* ENVIAR */
function enviarProduto(){
db.ref("products").push({
vendedor: document.getElementById("vendedor").value,
produto: document.getElementById("produto").value,
descricao: document.getElementById("descricao").value,
valor: document.getElementById("valor").value,
whatsapp: document.getElementById("whatsapp").value,
instagram: document.getElementById("instagram").value,
status:"pendente"
});

alert("Enviado!");
}

/* LISTA */
db.ref("products").on("value", snap=>{
let data = snap.val() || {};
let html="";
let adminHTML="";

for(let id in data){
let d = data[id];
if(!d) continue;

if(d.status==="aprovado"){
html+=`
<div class="card">
<b>${d.produto}</b><br>
${d.vendedor}<br>
</div>`;
}

if(isAdmin){
adminHTML+=`
<div class="card">
<b>${d.produto}</b><br>
Status: ${d.status}<br>

<button onclick="aprovar('${id}')">Ativar</button>
<button onclick="reprovar('${id}')">Desativar</button>
<button onclick="deletar('${id}')">Deletar</button>
</div>`;
}
}

lista.innerHTML=html;
adminLista.innerHTML=adminHTML;
});

/* ADMIN */
function aprovar(id){
db.ref("products/"+id).update({status:"aprovado"});
}

function reprovar(id){
db.ref("products/"+id).update({status:"desativado"});
}

function deletar(id){
db.ref("products/"+id).remove();
}

function ativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"aprovado"}));
});
}

function desativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"desativado"}));
});
}

function deletarTodos(){
db.ref("products").remove();
}

/* LOGIN */
function toggleLogin(){
loginBox.style.display = loginBox.style.display==="block"?"none":"block";
}

function login(){
const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

if(
(u==="INFINITY" && p==="CLIENTE") ||
(u==="administrador" && p==="38645920")
){
isAdmin=true;
document.getElementById("adminBtn").style.display="flex";
alert("ADMIN LIBERADO");
}
}

/* ADMIN PANEL */
function toggleAdmin(){
document.getElementById("adminPanel").classList.toggle("open");
}
</script>

</body>
  </html>
