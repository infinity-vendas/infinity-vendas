<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY VENDAS ON-LINE</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#ff2e2e;}

header{
background:#8b0000;
color:#fff;
padding:15px;
text-align:center;
font-weight:bold;
}

#products{padding:10px;display:grid;gap:10px;}

.card{
background:#111;
border-left:4px solid red;
padding:10px;
border-radius:6px;
font-size:12px;
}

.ativo{border-color:#00ff55;}
.desativado{border-color:orange;}
.bloqueado{border-color:gray;}

#adminBtn{
position:fixed;
top:50%;
right:10px;
width:45px;
height:45px;
background:red;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:#fff;
}

#adminPanel{
position:fixed;
top:10%;
right:-340px;
width:320px;
height:80%;
background:#0a0a0a;
border-left:2px solid red;
padding:10px;
overflow:auto;
transition:0.4s;
}
#adminPanel.open{right:0;}

input,select,button{
width:100%;
padding:7px;
margin:4px 0;
background:#000;
color:#ff4d4d;
border:1px solid red;
font-size:12px;
}

button{background:red;color:#fff;cursor:pointer;}

#login{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

#login input{width:200px;margin:5px;}

.whatsapp{
position:fixed;
bottom:10px;
right:10px;
width:40px;
height:40px;
background:red;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:#fff;
opacity:0.7;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN ADMIN -->
<div id="login">
<h3>LOGIN ADMIN</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<header>🔥 INFINITY VENDAS ON-LINE 🔥</header>

<div id="products"></div>

<div id="adminBtn" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">

<h3>ADMIN PAINEL</h3>

<input id="vendedor" placeholder="Vendedor">
<input id="valor" placeholder="Valor">
<input id="produto" placeholder="Produto">
<input id="descricao" placeholder="Descrição">
<input id="whatsapp" placeholder="WhatsApp (DDD+número)">
<input id="rede" placeholder="Rede social (opcional)">
<input id="idade" placeholder="Idade (opcional)">
<input id="tipo" placeholder="Tipo: APK / ARQUIVOS">
<input id="parceria" placeholder="Parcerias (opcional)">
<input id="expira" placeholder="Tempo expiração (segundos)">

<button onclick="addProduct()">Adicionar Produto</button>

<hr>

<h4>Controle por Vendedor</h4>
<input id="targetUID" placeholder="Vendedor (UID)">

<button onclick="setStatus('ativo')">Ativar</button>
<button onclick="setStatus('desativado')">Desativar</button>
<button onclick="deleteByUID()">Deletar</button>

<hr>

<h4>⏱ Alterar Cronômetro</h4>
<input id="editUID" placeholder="Vendedor (UID)">
<input id="editTime" placeholder="Novo tempo (segundos)">
<button onclick="updateTimer()">Atualizar cronômetro</button>

</div>

<div class="whatsapp">💬</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDXDca5ZxCZZ7lHUz4dlx0Qe6BarJSuA",
  authDomain: "infinity-vendas.firebaseapp.com",
  databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
  projectId: "infinity-vendas",
  storageBucket: "infinity-vendas.firebasestorage.app",
  messagingSenderId: "613112794080",
  appId: "1:613112794080:web:acd63b723aec957b21f985"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LOGIN */
function login(){
if(user.value==="INFINITY" && pass.value==="CLIENTE"){
login.style.display="none";
}else{
alert("Acesso negado");
}
}

/* ADMIN */
function toggleAdmin(){
adminPanel.classList.toggle("open");
}

/* ADD PRODUCT */
function addProduct(){
db.ref("products").push({
vendedor:vendedor.value,
valor:valor.value,
produto:produto.value,
descricao:descricao.value,
whatsapp:whatsapp.value,
rede:rede.value,
idade:idade.value,
tipo:tipo.value,
parceria:parceria.value,
status:"ativo",
created:Date.now(),
expira:expira.value ? Date.now() + (expira.value*1000) : null
});
alert("Produto adicionado!");
}

/* STATUS */
function setStatus(status){
let t=targetUID.value;

db.ref("products").once("value",snap=>{
snap.forEach(i=>{
if(i.val().vendedor==t){
i.ref.update({status});
}
});
});
}

/* DELETE */
function deleteByUID(){
let t=targetUID.value;

db.ref("products").once("value",snap=>{
snap.forEach(i=>{
if(i.val().vendedor==t){
i.ref.remove();
}
});
});
}

/* CRONÔMETRO POR VENDEDOR */
function updateTimer(){
let uid = editUID.value;
let time = parseInt(editTime.value);

db.ref("products").once("value",snap=>{
snap.forEach(i=>{
if(i.val().vendedor == uid){
i.ref.update({
expira: Date.now() + (time * 1000)
});
}
});
});

alert("Cronômetro atualizado!");
}

/* ADQUIRIR */
function buy(num){
window.open("https://wa.me/"+num,"_blank");
}

/* FORMAT TIME */
function format(ms){
let s=Math.floor(ms/1000)%60;
let m=Math.floor(ms/60000)%60;
let h=Math.floor(ms/3600000);
return `${h}h ${m}m ${s}s`;
}

/* RENDER + CRONÔMETRO REAL */
db.ref("products").on("value",snap=>{
let html="";

snap.forEach(i=>{
let d=i.val();

let restante = d.expira ? (d.expira - Date.now()) : null;
if(restante < 0) restante = 0;

html+=`
<div class="card ${d.status}">
<b>${d.produto}</b><br>
${d.descricao}<br>
R$ ${d.valor}<br>
Vendedor: ${d.vendedor}<br>
Whats: ${d.whatsapp}<br>
Tipo: ${d.tipo}<br>
⏳ Tempo: ${restante!==null ? format(restante) : "Sem limite"}<br>

<button onclick="buy('${d.whatsapp}')">Adquirir produto</button>
</div>`;
});

products.innerHTML=html;
});
</script>

</body>
  </html>
