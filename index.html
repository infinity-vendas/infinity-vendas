<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#ff7a00;}
header{background:#111;padding:15px;text-align:center;font-size:20px;font-weight:bold;}

.marquee{
background:#000;
color:#ff7a00;
padding:8px;
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #222;
}
.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{padding:15px;}

input{
width:100%;padding:10px;margin:6px 0;
border-radius:8px;border:1px solid #333;
background:#111;color:#fff;
}

.btn{
background:red;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;
border:3px dashed #ff2a2a;
box-shadow:0 0 10px #ff0000;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.buyBtn{
background:#ff7a00;
color:#000;
padding:10px;
border:none;
border-radius:8px;
width:100%;
margin-top:8px;
cursor:pointer;
font-weight:bold;
}

#adminPanel{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
overflow:auto;
display:block; /* 🔥 CORREÇÃO PRINCIPAL */
z-index:9999;
}

#adminPanel.open{right:0;}

#loginBox{
position:fixed;
bottom:80px;
right:15px;
width:220px;
background:#111;
padding:10px;
display:none;
border-radius:10px;
z-index:9999;
}

#loginBtn{
position:fixed;
bottom:15px;
right:15px;
width:55px;
height:55px;
background:#ff7a00;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
font-weight:bold;
color:#000;
z-index:9999;
}

/* FLOAT NOTIFICAÇÃO */
#notifyBar{
position:fixed;
top:0;
left:0;
width:100%;
background:#ff7a00;
color:#000;
text-align:center;
padding:10px;
display:none;
z-index:99999;
font-weight:bold;
}

/* CHAT BOLHA */
#chatBubble{
position:fixed;
bottom:80px;
right:15px;
width:55px;
height:55px;
background:#ff7a00;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:22px;
z-index:99999;
}

#chatBox{
position:fixed;
bottom:150px;
right:15px;
width:260px;
background:#111;
border:1px solid #ff7a00;
border-radius:10px;
padding:10px;
display:none;
z-index:99999;
}
</style>
</head>

<body>

<div id="notifyBar">🔔 Sistema atualizado com sucesso - INFINITY DIVULGAÇÕES</div>

<header>INFINITY DIVULGAÇÕES</header>

<div class="marquee">
<span>🔥 SISTEMA ATIVO • HOTMART STYLE • ADMIN SEGURADO • WHATSAPP DIRETO ⚡</span>
</div>

<div class="container">

<h3>Produtos cadastrados</h3>
<div id="lista"></div>

<hr>

<h3>Cadastro</h3>

<input id="vendedor" placeholder="vendedor">
<input id="produto" placeholder="produto">
<input id="descricao" placeholder="descrição">
<input id="valor" placeholder="valor">
<input id="whatsapp" placeholder="whatsapp">
<input id="instagram" placeholder="instagram">

<button class="btn" onclick="enviarProduto()">ENVIAR SOLICITAÇÃO</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>ADMIN</h3>
<button onclick="ativarTodos()">Ativar todos</button>
<button onclick="desativarTodos()">Desativar todos</button>
<button onclick="deletarTodos()">Deletar todos</button>
<div id="adminLista"></div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()" class="btn">Entrar</button>
</div>

<div id="loginBtn" onclick="toggleLogin()">ADMIN</div>

<!-- CHAT -->
<div id="chatBubble" onclick="toggleChat()">💬</div>

<div id="chatBox">
<p><b>Suporte INFINITY</b></p>
<button onclick="support('Suporte')">Suporte</button>
<button onclick="support('Denunciar vendedor')">Denunciar vendedor</button>
<button onclick="support('Produto fraude')">Produto fraude</button>
<button onclick="support('Reembolso')">Reembolso</button>
<button class="btn" style="background:#ff7a00;color:#000;margin-top:5px;"
onclick="devContact()">Entrar em contato com desenvolvedor</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDXDca5ZxCZKZz7lHUz4dlx0Qe6BarJSuA",
authDomain: "infinity-vendas.firebaseapp.com",
databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
projectId: "infinity-vendas",
storageBucket: "infinity-vendas.appspot.com",
messagingSenderId: "613112794080",
appId: "1:613112794080:web:acd63b723aec957b21f985"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let isAdmin = false;

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("pass").value
).then(()=>{
isAdmin = true;
document.getElementById("adminPanel").classList.add("open");
alert("ADMIN LIBERADO");
}).catch(e=>alert(e.message));
}

/* PRODUTO */
function enviarProduto(){
db.ref("products").push({
vendedor:vendedor.value,
produto:produto.value,
descricao:descricao.value,
valor:valor.value,
whatsapp:whatsapp.value,
instagram:instagram.value,
status:"pendente"
});
alert("Enviado!");
}

/* LISTA */
db.ref("products").on("value",snap=>{
let data=snap.val()||{};
let html="";
let adminHTML="";

for(let id in data){
let d=data[id];
if(!d) continue;

if(d.status==="aprovado"){
html+=`
<div class="card">
<b>${d.produto}</b><br>
${d.vendedor}<br>
${d.valor}<br>
<button class="buyBtn" onclick="comprar('${d.produto}','${d.valor}','${d.whatsapp}')">Adquirir produto</button>
</div>`;
}

if(isAdmin){
adminHTML+=`
<div class="card">
<b>${d.produto}</b><br>
${d.vendedor}<br>
${d.status}<br>
<button onclick="aprovar('${id}')">Ativar</button>
<button onclick="reprovar('${id}')">Desativar</button>
<button onclick="deletar('${id}')">Deletar</button>
</div>`;
}
}

lista.innerHTML=html;
adminLista.innerHTML=adminHTML;
});

/* ADMIN */
function aprovar(id){db.ref("products/"+id).update({status:"aprovado"});}
function reprovar(id){db.ref("products/"+id).update({status:"desativado"});}
function deletar(id){db.ref("products/"+id).remove();}

/* CHAT */
function toggleChat(){
chatBox.style.display = chatBox.style.display==="block"?"none":"block";
}

function support(type){
window.open(`https://wa.me/551981528372?text=Suporte: ${type} - INFINITY DIVULGAÇÕES`);
}

function devContact(){
window.open("https://wa.me/551981528372?text=Quero suporte do desenvolvedor INFINITY ⚡");
}

/* LOGIN UI */
function toggleLogin(){
loginBox.style.display = loginBox.style.display==="block"?"none":"block";
}

/* NOTIFICAÇÃO */
window.onload=()=>{
const bar=document.getElementById("notifyBar");
bar.style.display="block";
setTimeout(()=>bar.style.display="none",2000);
}
</script>

</body>
  </html>
