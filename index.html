<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#ff7a00;}
header{background:#111;padding:15px;text-align:center;font-size:20px;font-weight:bold;}

/* MARQUEE */
.marquee{
background:#000;
color:#ff7a00;
padding:8px;
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #222;
}
.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{padding:15px;}

input{
width:100%;padding:10px;margin:6px 0;
border-radius:8px;border:1px solid #333;
background:#111;color:#fff;
}

/* BOTÃO */
.btn{
background:red;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;

border:3px dashed #ff2a2a;
box-shadow:0 0 10px #ff0000;
}
.btn:hover{transform:scale(1.02);}

/* CARD */
.card{
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

/* ADMIN */
#adminPanel{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
overflow:auto;
display:none;
}

#adminPanel.open{right:0;}

/* LOGIN */
#loginBox{
position:fixed;
bottom:80px;
right:15px;
width:220px;
background:#111;
padding:10px;
display:none;
border-radius:10px;
}

/* BOTÃO LOGIN */
#loginBtn{
position:fixed;
bottom:15px;
right:15px;
width:55px;
height:55px;
background:#ff7a00;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
font-weight:bold;
color:#000;
}

/* FLOAT MSG */
#floatMsg{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:#111;
border:1px solid #ff7a00;
padding:10px;
border-radius:10px;
display:none;
z-index:9999;
width:90%;
max-width:400px;
}
</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>

<div class="marquee">
<span>🔥 INFINITY DIVULGAÇÕES • SISTEMA DE PRODUTOS • WHATSAPP DIRETO • APROVAÇÃO ADMIN ⚡</span>
</div>

<div id="floatMsg"></div>

<div class="container">

<h3>Produtos cadastrados</h3>
<div id="lista"></div>

<hr>

<h3>Cadastro</h3>

<input id="vendedor" placeholder="vendedor">
<input id="produto" placeholder="produto">
<input id="descricao" placeholder="descrição">
<input id="valor" placeholder="valor">
<input id="whatsapp" placeholder="whatsapp">
<input id="instagram" placeholder="instagram">

<button class="btn" onclick="enviarProduto()">ENVIAR SOLICITAÇÃO</button>

</div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>ADMIN</h3>

<button onclick="ativarTodos()">Ativar todos</button>
<button onclick="desativarTodos()">Desativar todos</button>
<button onclick="deletarTodos()">Deletar todos</button>

<div id="adminLista"></div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()" class="btn">Entrar</button>
</div>

<div id="loginBtn" onclick="toggleLogin()">ADMIN</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDXDca5ZxCZKZz7lHUz4dlx0Qe6BarJSuA",
authDomain: "infinity-vendas.firebaseapp.com",
databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
projectId: "infinity-vendas",
storageBucket: "infinity-vendas.appspot.com",
messagingSenderId: "613112794080",
appId: "1:613112794080:web:acd63b723aec957b21f985"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let isAdmin = false;

/* LOGIN */
function login(){
const email = document.getElementById("email").value;
const pass = document.getElementById("pass").value;

auth.signInWithEmailAndPassword(email, pass)
.then(()=>{
isAdmin = true;
document.getElementById("adminPanel").style.display="block";
document.getElementById("adminPanel").classList.add("open");
alert("ADMIN LIBERADO");
})
.catch(e=> alert(e.message));
}

/* ENVIAR */
function enviarProduto(){

const vendedor = document.getElementById("vendedor").value;
const produto = document.getElementById("produto").value;
const descricao = document.getElementById("descricao").value;
const valor = document.getElementById("valor").value;
const whatsapp = document.getElementById("whatsapp").value;
const instagram = document.getElementById("instagram").value;

db.ref("products").push({
vendedor, produto, descricao, valor, whatsapp, instagram,
status:"pendente"
});

alert("Enviado!");
}

/* LISTA */
db.ref("products").on("value", snap=>{
let data = snap.val() || {};
let html="";
let adminHTML="";

for(let id in data){
let d = data[id];
if(!d) continue;

/* VISITANTE */
if(d.status==="aprovado"){
html+=`
<div class="card">
<b>Produto:</b> ${d.produto}<br>
<b>Vendedor:</b> ${d.vendedor}<br>
<b>Descrição:</b> ${d.descricao}<br>
<b>Valor:</b> ${d.valor}<br>
<b>WhatsApp:</b> ${d.whatsapp}<br>
<b>Instagram:</b> ${d.instagram}<br>

<button onclick="comprar('${d.produto}','${d.valor}','${d.whatsapp}')">
Adquirir agora
</button>
</div>`;
}

/* ADMIN */
if(isAdmin){
adminHTML+=`
<div class="card">
<b>${d.produto}</b><br>
Vendedor: ${d.vendedor}<br>
Status: ${d.status}<br>

<button onclick="aprovar('${id}')">Ativar</button>
<button onclick="reprovar('${id}')">Desativar</button>
<button onclick="deletar('${id}')">Deletar</button>
</div>`;
}
}

document.getElementById("lista").innerHTML=html;
document.getElementById("adminLista").innerHTML=adminHTML;
});

/* WHATSAPP */
function comprar(produto, valor, whatsapp){
const msg = `Quero adquirir produto agora, vim pelo site INFINITY DIVULGAÇÕES ⚡

Produto: ${produto}
Valor: ${valor}`;

window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(msg)}`);
}

/* ADMIN */
function aprovar(id){ db.ref("products/"+id).update({status:"aprovado"}); }
function reprovar(id){ db.ref("products/"+id).update({status:"desativado"}); }
function deletar(id){ db.ref("products/"+id).remove(); }

function ativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"aprovado"}));
});
}

function desativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"desativado"}));
});
}

function deletarTodos(){
db.ref("products").remove();
}

/* UI */
function toggleLogin(){
document.getElementById("loginBox").style.display =
document.getElementById("loginBox").style.display==="block"?"none":"block";
}
</script>

</body>
  </html>
