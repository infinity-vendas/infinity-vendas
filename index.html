<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:#fff;
}

/* HEADER */
header{
background:#b30000;
padding:14px;
text-align:center;
font-weight:bold;
}

/* LETREIRO */
#ticker{
background:#111;
padding:10px;
font-size:12px;
color:#ff4d4d;
text-align:center;
}

/* GRID */
#products{
padding:12px;
display:grid;
grid-template-columns:repeat(2, 1fr);
gap:10px;
}

/* CARD */
.card{
background:#111;
border:1px solid #333;
border-radius:12px;
padding:10px;
font-size:12px;
opacity:0.95;
}

.card b{
color:#ff4d4d;
}

/* BOTÃO */
button{
width:100%;
padding:7px;
margin-top:6px;
border:none;
border-radius:8px;
background:#ff4d4d;
color:#fff;
cursor:pointer;
}

/* LOGIN BOTÃO */
#loginBtn{
position:fixed;
bottom:15px;
right:70px;
width:45px;
height:45px;
background:#ff4d4d;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
opacity:0.5;
z-index:999;
}

/* LOGIN BOX */
#loginBox{
position:fixed;
bottom:70px;
right:15px;
width:200px;
background:#111;
padding:10px;
border-radius:10px;
border:1px solid #333;
display:none;
z-index:999;
}

/* ADMIN */
#adminBtn{
position:fixed;
top:50%;
right:10px;
width:45px;
height:45px;
background:#ff4d4d;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:999;
}

#adminPanel{
position:fixed;
top:10%;
right:-360px;
width:320px;
height:80%;
background:#111;
border-left:2px solid #ff4d4d;
padding:10px;
overflow:auto;
transition:0.3s;
z-index:998;
}

#adminPanel.open{right:0;}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:1px solid #333;
background:#000;
color:#fff;
}

/* CHAT */
#chatBtn{
position:fixed;
bottom:15px;
left:15px;
width:50px;
height:50px;
background:#ff4d4d;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
opacity:0.5;
z-index:999;
}

#chatBox{
position:fixed;
bottom:80px;
left:15px;
width:220px;
background:#111;
border:1px solid #333;
border-radius:10px;
padding:10px;
display:none;
opacity:0.5;
z-index:999;
}

.chatItem{
padding:6px;
margin:5px 0;
background:#000;
border-radius:8px;
cursor:pointer;
font-size:12px;
}
</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>

<div id="ticker">
Planos a partir de $0,97 • Vendas 24h • Segurança ponta a ponta
</div>

<div id="products"></div>

<!-- BOTÃO LOGIN -->
<div id="loginBtn" onclick="toggleLogin()">🔐</div>

<!-- LOGIN -->
<div id="loginBox">
<b>ADMIN</b>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="toggleLogin()">Fechar</button>
</div>

<!-- CHAT -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatBox">
<div class="chatItem" onclick="openWhats('suporte')">Suporte</div>
<div class="chatItem" onclick="openWhats('denuncia vendedor')">Denunciar vendedor</div>
<div class="chatItem" onclick="openWhats('spam')">Denunciar spam</div>
</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">
<h3>ADMIN</h3>

<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">
<input id="descricao" placeholder="Descrição">
<input id="estoque" placeholder="Estoque">

<button onclick="addProduct()">Criar produto</button>

<hr>

<input id="targetUID" placeholder="UID vendedor">
<button onclick="setStatus('aprovado')">Aprovar</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDXDca5ZxCZZ7lHUz4dlx0Qe6BarJSuA",
authDomain: "infinity-vendas.firebaseapp.com",
databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
projectId: "infinity-vendas"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LOGIN */
function toggleLogin(){
let box = document.getElementById("loginBox");
box.style.display = box.style.display==="block"?"none":"block";
}

function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u==="INFINITY" && p==="CLIENTE"){
document.getElementById("loginBox").style.display="none";
document.getElementById("loginBtn").style.display="none";
document.getElementById("adminBtn").style.display="flex";
document.getElementById("chatBtn").style.display="flex";
alert("Login OK");
}else{
alert("Login inválido");
}
}

/* CHAT */
function toggleChat(){
let c = document.getElementById("chatBox");
c.style.display = c.style.display==="block"?"none":"block";
}

function openWhats(msg){
window.open("https://wa.me/51981528372?text="+encodeURIComponent(msg));
}

/* ADMIN */
function toggleAdmin(){
document.getElementById("adminPanel").classList.toggle("open");
}

/* ADD */
function addProduct(){
let uid = "UID-" + Math.random().toString(36).substr(2,9);

db.ref("products").push({
uid: uid,
produto:produto.value,
valor:valor.value,
descricao:descricao.value,
estoque:estoque.value,
status:"aprovado"
});
}

/* STATUS */
function setStatus(status){
let t = targetUID.value;

db.ref("products").once("value",snap=>{
snap.forEach(i=>{
if(i.val().uid==t){
i.ref.update({status});
}
});
});
}

/* RENDER */
db.ref("products").on("value",snap=>{
let html="";

snap.forEach(i=>{
let d=i.val();
if(d.status!=="aprovado") return;

html+=`
<div class="card">
<b>${d.produto}</b><br>
${d.descricao}<br>
R$ ${d.valor}<br>
<button onclick="openWhats('${d.uid}')">Comprar</button>
</div>`;
});

products.innerHTML=html;
});
</script>

</body>
  </html>
