<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#ff7a00;}
header{background:#111;padding:15px;text-align:center;font-weight:bold;}

.container{padding:15px;}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #333;
background:#111;
color:#fff;
}

.btn{
background:red;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

#adminBtn{
position:fixed;
top:50%;
right:10px;
width:50px;
height:50px;
background:red;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
}

#adminPanel{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:#111;
padding:10px;
transition:0.3s;
overflow:auto;
}

#adminPanel.open{right:0;}

#loginBox{
position:fixed;
bottom:80px;
right:15px;
width:220px;
background:#111;
padding:10px;
border-radius:10px;
}

#debug{
position:fixed;
top:0;
left:0;
width:100%;
background:#ff0000;
color:#fff;
padding:8px;
font-size:12px;
z-index:99999;
display:none;
}
</style>
</head>

<body>

<div id="debug">DEBUG: iniciando...</div>

<header>INFINITY DIVULGAÇÕES</header>

<div class="container">

<h3>Produtos cadastrados</h3>
<div id="lista"></div>

<hr>

<h3>Cadastro</h3>

<input id="vendedor" placeholder="vendedor">
<input id="produto" placeholder="produto">
<input id="descricao" placeholder="descrição">
<input id="valor" placeholder="valor">
<input id="whatsapp" placeholder="whatsapp">
<input id="instagram" placeholder="instagram">

<button class="btn" onclick="enviarProduto()">ENVIAR SOLICITAÇÃO</button>

</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="toggleAdmin()">A</div>

<div id="adminPanel">
<h3>ADMIN</h3>

<button onclick="ativarTodos()">Ativar todos</button>
<button onclick="desativarTodos()">Desativar todos</button>
<button onclick="deletarTodos()">Deletar todos</button>

<div id="adminLista"></div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const debug = document.getElementById("debug");
function log(msg){ debug.style.display="block"; debug.innerText="DEBUG: "+msg; }

log("Carregando Firebase...");

const firebaseConfig = {
apiKey:"AIzaSyDX...",
authDomain:"infinity-vendas.firebaseapp.com",
databaseURL:"https://infinity-vendas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let isAdmin = false;

/* TESTE CONEXÃO FIREBASE */
firebase.database().ref(".info/connected").on("value", snap=>{
if(snap.val()){
log("Firebase conectado OK");
}else{
log("Sem conexão com Firebase");
}
});

/* LOGIN DEBUG */
function login(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

log("Tentando login...");

auth.signInWithEmailAndPassword(email, password)
.then(user=>{
log("Login OK: " + user.user.email);

isAdmin = true;
document.getElementById("adminBtn").style.display="flex";
alert("LOGIN OK");
})
.catch(err=>{
log(err.code + " | " + err.message);
alert(err.message);
});
}

/* ENVIAR */
function enviarProduto(){
db.ref("products").push({
vendedor:vendedor.value,
produto:produto.value,
descricao:descricao.value,
valor:valor.value,
whatsapp:whatsapp.value,
instagram:instagram.value,
status:"pendente"
});
}

/* LISTA */
db.ref("products").on("value", snap=>{
let data=snap.val()||{};
let html="";
let adminHTML="";

for(let id in data){
let d=data[id];

if(d.status==="aprovado"){
html+=`
<div class="card">
<b>${d.produto}</b><br>
${d.vendedor}
</div>`;
}

if(isAdmin){
adminHTML+=`
<div class="card">
<b>${d.produto}</b><br>
Status: ${d.status}<br>

<button onclick="aprovar('${id}')">Ativar</button>
<button onclick="reprovar('${id}')">Desativar</button>
<button onclick="deletar('${id}')">Deletar</button>
</div>`;
}
}

lista.innerHTML=html;
adminLista.innerHTML=adminHTML;
});

/* ADMIN */
function aprovar(id){ db.ref("products/"+id).update({status:"aprovado"}); }
function reprovar(id){ db.ref("products/"+id).update({status:"desativado"}); }
function deletar(id){ db.ref("products/"+id).remove(); }

function ativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"aprovado"}));
});
}

function desativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"desativado"}));
});
}

function deletarTodos(){
db.ref("products").remove();
}

/* ADMIN PANEL */
function toggleAdmin(){
document.getElementById("adminPanel").classList.toggle("open");
}
</script>

</body>
  </html>
