<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY VENDAS ON-LINE</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#ff2e2e;}

header{
background:#8b0000;
color:#fff;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.marquee{
background:#111;
color:#00aaff;
padding:6px;
white-space:nowrap;
overflow:hidden;
}
.marquee span{
display:inline-block;
padding-left:100%;
animation:move 18s linear infinite;
font-size:12px;
}
@keyframes move{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}

#products{padding:10px;display:grid;gap:10px;}

.card{
background:#111;
border-left:4px solid red;
padding:10px;
border-radius:6px;
font-size:12px;
}

.ativo{border-color:#00ff55;}
.desativado{border-color:orange;}
.bloqueado{border-color:gray;}

#adminBtn{
position:fixed;
top:50%;
right:10px;
width:45px;
height:45px;
background:red;
color:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#adminPanel{
position:fixed;
top:10%;
right:-340px;
width:320px;
height:80%;
background:#0a0a0a;
border-left:2px solid red;
padding:10px;
overflow:auto;
transition:0.4s;
}
#adminPanel.open{right:0;}

#minBtn{
position:absolute;
top:5px;
right:5px;
background:red;
color:#fff;
font-size:10px;
padding:3px;
cursor:pointer;
}

input,select,button{
width:100%;
padding:7px;
margin:4px 0;
background:#000;
color:#ff4d4d;
border:1px solid red;
font-size:12px;
}

button{background:red;color:#fff;cursor:pointer;}

#cart{
position:fixed;
bottom:80px;
right:10px;
background:#111;
border:1px solid red;
padding:10px;
width:200px;
font-size:11px;
}

.whatsapp{
position:fixed;
bottom:15px;
right:15px;
width:55px;
height:55px;
background:red;
color:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
cursor:pointer;
}
</style>
</head>

<body>

<header>🔥 INFINITY VENDAS ON-LINE 🔥</header>

<div class="marquee">
<span>Bem-vindo à plataforma • Não coletamos dados • Ganhe 20% por indicação ⚡</span>
</div>

<div id="products"></div>

<div id="cart">
<b>Carrinho</b>
<div id="cartItems"></div>
</div>

<div id="adminBtn" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">
<div id="minBtn" onclick="toggleAdmin()">–</div>

<h3>ADMIN</h3>

<input id="uid" placeholder="UID vendedor">
<input id="vendedor" placeholder="Vendedor">
<input id="valor" placeholder="Valor">
<input id="produto" placeholder="Produto">
<input id="descricao" placeholder="Descrição">
<input id="whatsapp" placeholder="WhatsApp">
<input id="expira" placeholder="Tempo expiração (segundos)">

<select id="tipo">
<option>Padrão</option>
<option>Destaque</option>
<option>Premium</option>
</select>

<button onclick="addProduct()">Adicionar Produto</button>

<hr>

<h4>Controle por UID</h4>
<input id="targetUID" placeholder="UID alvo">

<button onclick="setStatus('ativo')">Ativar</button>
<button onclick="setStatus('desativado')">Desativar</button>
<button onclick="setStatus('bloqueado')">Bloquear</button>
<button onclick="deleteByUID()">Deletar</button>

<hr>

<h4>Data / Hora / Cronômetro</h4>

<input id="newDate" placeholder="Data (ex: 2026-04-15)">
<input id="newTime" placeholder="Hora (ex: 14:30:00)">
<input id="newExpire" placeholder="Tempo (segundos)">
<input id="targetUIDTime" placeholder="UID vendedor">

<button onclick="updateTime()">Atualizar tempo</button>

<button onclick="resetAll()">Resetar loja</button>
</div>

<div class="whatsapp" onclick="window.open('https://wa.me/5551981528372')">💬</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDXDca5ZxCZZ7lHUz4dlx0Qe6BarJSuA",
  authDomain: "infinity-vendas.firebaseapp.com",
  databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
  projectId: "infinity-vendas",
  storageBucket: "infinity-vendas.firebasestorage.app",
  messagingSenderId: "613112794080",
  appId: "1:613112794080:web:acd63b723aec957b21f985",
  measurementId: "G-Z04RV95D3Z"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cart=[];

function toggleAdmin(){
document.getElementById("adminPanel").classList.toggle("open");
}

function addProduct(){
db.ref("products").push({
uid:uid.value,
vendedor:vendedor.value,
valor:valor.value,
produto:produto.value,
descricao:descricao.value,
whatsapp:whatsapp.value,
tipo:tipo.value,
status:"ativo",
created:Date.now(),
expira:expira.value?Date.now()+expira.value*1000:null
});
alert("Produto adicionado!");
}

function setStatus(status){
let t=targetUID.value;
db.ref("products").once("value",s=>{
s.forEach(i=>{
if(i.val().uid==t){
i.ref.update({status});
}
});
});
}

function deleteByUID(){
let t=targetUID.value;
db.ref("products").once("value",s=>{
s.forEach(i=>{
if(i.val().uid==t){
i.ref.remove();
}
});
});
}

function resetAll(){
db.ref().set(null);
}

function addToCart(p){
cart.push(p);
renderCart();
}

function renderCart(){
cartItems.innerHTML=cart.map(c=>`<div>${c.produto} - R$ ${c.valor}</div>`).join("");
}

function updateTime(){
let uid=targetUIDTime.value;
let date=newDate.value;
let time=newTime.value;
let exp=newExpire.value;

db.ref("products").once("value",s=>{
s.forEach(i=>{
if(i.val().uid==uid){
i.ref.update({
data:date,
hora:time,
expira:exp?Date.now()+exp*1000:null
});
}
});
});
alert("Atualizado!");
}

db.ref("products").on("value",snap=>{
let html="";
snap.forEach(i=>{
let d=i.val();
html+=`
<div class="card ${d.status}">
<b>${d.produto}</b><br>
${d.descricao}<br>
R$ ${d.valor}<br>
Vendedor: ${d.vendedor}<br>
Whats: ${d.whatsapp}<br>
Status: ${d.status}<br>
${d.data||""} ${d.hora||""}<br>
<button onclick='addToCart(${JSON.stringify(d)})'>Carrinho</button>
</div>`;
});
products.innerHTML=html;
});
</script>

</body>
                                                                                </html>
