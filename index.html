<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body { margin:0; font-family:Arial; background:#000; color:#ff7a00; }

header {
background:#111;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.marquee {
background:#000;
color:#ff7a00;
padding:8px;
white-space:nowrap;
overflow:hidden;
border-bottom:1px solid #222;
}

.marquee span {
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll {
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.container{padding:15px;}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #333;
background:#111;
color:#fff;
}

.btn{
background:#ff7a00;
color:#000;
padding:12px;
border:none;
border-radius:8px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.buyBtn{
background:#25D366;
color:#fff;
padding:8px;
border:none;
border-radius:6px;
margin-top:5px;
cursor:pointer;
font-weight:bold;
width:100%;
}

.timer{
color:#fff;
font-size:13px;
margin-top:5px;
}

/* POPUP PIX */
#pixBox{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
border:2px solid #ff7a00;
padding:15px;
border-radius:10px;
z-index:999999;
display:none;
text-align:center;
width:90%;
max-width:320px;
}

#pixBox img{
width:100%;
border-radius:10px;
margin:10px 0;
border:2px solid #ff7a00;
}

#pixBox button{
background:red;
color:#fff;
border:none;
padding:10px;
margin-top:10px;
width:100%;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>

<div class="marquee">
<span>⚡ Adquira versão VIP ilimitadas! Seus produtos online 24h ⚡ WhatsApp: 51981528372</span>
</div>

<!-- PIX BOX -->
<div id="pixBox">
<h3>💰 Pagamento PIX</h3>

<img src="https://raw.githubusercontent.com/infinity-vendas/infinity-vendas/main/Screenshot_20260417-042120-1.png">

<p><b>Chave PIX:</b> 51981528372</p>
<p id="pixInfo"></p>

<button onclick="fecharPix()">FECHAR</button>
</div>

<div class="container">

<h3>Produtos cadastrados</h3>
<div id="lista">Carregando...</div>

<hr>

<h3>Cadastro</h3>

<input id="vendedor" placeholder="Nome vendedor">
<input id="produto" placeholder="Produto">
<input id="valor" placeholder="Valor">
<input id="descricao" placeholder="Descrição">
<input id="whatsapp" placeholder="WhatsApp">

<button class="btn" onclick="enviarProduto()">ENVIAR PRODUTO</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDXDca5ZxCZKZz7lHUz4dlx0Qe6BarJSuA",
authDomain: "infinity-vendas.firebaseapp.com",
databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
projectId: "infinity-vendas"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cache={};

/* ENVIAR */
function enviarProduto(){
let expire = Date.now() + (24*60*60*1000);

db.ref("products").push({
vendedor:vendedor.value,
produto:produto.value,
valor:valor.value,
descricao:descricao.value,
whatsapp:(whatsapp.value||"").replace(/\D/g,''),
status:"pendente",
expiresAt:expire,
vendas:0
});
}

/* LISTA */
db.ref("products").on("value",snap=>{
cache = snap.val() || {};
render();
});

/* RENDER */
function render(){
let html="";

for(let id in cache){
let d=cache[id];
if(!d || d.status!=="aprovado") continue;

html+=`
<div class="card">
<b>⚡ ${d.vendedor}</b><br>
📦 ${d.produto}<br>
💰 R$ ${d.valor}<br>
📝 ${d.descricao}<br>

<div class="timer" id="t_${id}"></div>

<div>🔥 Vendas: ${d.vendas||0}</div>

<button class="buyBtn" onclick="comprar('${id}','${d.whatsapp}','${d.valor}','${d.produto}')">
📲 Comprar + PIX
</button>

</div>`;
}

lista.innerHTML = html || "<div class='card'>Nenhum produto ativo ⚠️</div>";
}

/* COMPRA */
function comprar(id,whats,valor,produto){

window.open("https://wa.me/"+whats,"_blank");

/* mostra PIX */
document.getElementById("pixInfo").innerHTML =
"Produto: " + produto + "<br>Valor: R$ " + valor;

pixBox.style.display="block";

/* vendas */
let v = (cache[id].vendas||0)+1;
db.ref("products/"+id).update({vendas:v});
}

/* FECHAR PIX */
function fecharPix(){
pixBox.style.display="none";
}

/* TIMER */
function atualizarTempos(){
for(let id in cache){
let d=cache[id];
if(!d || d.status!=="aprovado") continue;

let el = document.getElementById("t_"+id);
if(!el) continue;

let diff = d.expiresAt - Date.now();

if(diff <= 0){
el.innerHTML = "⏱ EXPIRADO ❌";
continue;
}

let s = Math.floor(diff/1000);
let m = Math.floor(s/60);
let h = Math.floor(m/60);

el.innerHTML = `⏱ ${h}h ${m%60}m ${s%60}s`;
}
}

setInterval(atualizarTempos,1000);
</script>

</body>
  </html>
