<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:#00ff55;}

header{background:#b30000;padding:14px;text-align:center;font-weight:bold;}

#ticker{
background:#111;
padding:10px;
font-size:12px;
color:#ff4d4d;
text-align:center;
}

/* NOVO LETREIRO */
#promo{
background:#000;
padding:8px;
font-size:11px;
text-align:center;
color:#00ff55;
}

#products{
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

/* CARD */
.card{
background:#111;
border:1px solid #333;
border-radius:12px;
padding:10px;
font-size:12px;
}

.card b{color:#00ff55;}

button{
width:100%;
padding:7px;
margin-top:6px;
border:none;
border-radius:8px;
background:#b30000;
color:#fff;
cursor:pointer;
}

.timer{
color:#ff0000;
font-size:11px;
margin-top:4px;
}

/* LOGIN */
#loginBtn{
position:fixed;
bottom:15px;
right:70px;
width:45px;
height:45px;
background:#b30000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
opacity:0.5;
}

#loginBox{
position:fixed;
bottom:70px;
right:15px;
width:200px;
background:#111;
padding:10px;
border-radius:10px;
display:none;
}

/* ADMIN */
#adminBtn{
position:fixed;
top:50%;
right:10px;
width:45px;
height:45px;
background:#b30000;
border-radius:50%;
display:none;
}

#adminPanel{
position:fixed;
top:10%;
right:-360px;
width:320px;
height:80%;
background:#111;
padding:10px;
transition:0.3s;
overflow:auto;
}

#adminPanel.open{right:0;}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
background:#000;
color:#00ff55;
border:1px solid #333;
}
</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>

<div id="ticker">
Planos a partir de $0,97 • Vendas 24h • Segurança total
</div>

<div id="promo">
Melhor painel de vendas e divulgações atualizado • Plano VIP mensal $29,97 • semanal $14,85 • trial $4,99
</div>

<div id="products"></div>

<!-- LOGIN -->
<div id="loginBtn" onclick="toggleLogin()">🔐</div>

<div id="loginBox">
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="toggleAdmin()">⚙️</div>

<div id="adminPanel">

<h3>ADMIN</h3>

<input id="nome" placeholder="Nome vendedor">
<input id="idade" placeholder="Idade">
<input id="produto" placeholder="Produto">
<input id="descricao" placeholder="Descrição">
<input id="valor" placeholder="Valor">
<input id="whatsapp" placeholder="WhatsApp DDD+">
<input id="instagram" placeholder="Instagram">
<input id="tiktok" placeholder="TikTok">
<input id="kwai" placeholder="Kwai">
<input id="tipo" placeholder="Tipo (APK/ZIP)">
<input id="vip" placeholder="VIP / Free">
<input id="desconto" placeholder="Desconto">
<input id="estoque" placeholder="Estoque">
<input id="tempo" placeholder="Tempo segundos">

<button onclick="addProduct()">Criar produto</button>

<hr>

<input id="uid" placeholder="UID produto">

<button onclick="updateStatus('aprovado')">Ativar</button>
<button onclick="updateStatus('bloqueado')">Bloquear</button>
<button onclick="deleteProduct()">Deletar</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyDX...",
authDomain:"infinity-vendas.firebaseapp.com",
databaseURL:"https://infinity-vendas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* LOGIN */
function toggleLogin(){
loginBox.style.display=loginBox.style.display==="block"?"none":"block";
}

function login(){
if(user.value==="INFINITY"&&pass.value==="CLIENTE"){
loginBox.style.display="none";
loginBtn.style.display="none";
adminBtn.style.display="flex";
}
}

/* ADMIN */
function toggleAdmin(){
adminPanel.classList.toggle("open");
}

/* ADD */
function addProduct(){
let id=db.ref("products").push().key;

db.ref("products/"+id).set({
uid:id,
nome:nome.value,
idade:idade.value,
produto:produto.value,
descricao:descricao.value,
valor:valor.value,
whatsapp:whatsapp.value,
instagram:instagram.value,
tiktok:tiktok.value,
kwai:kwai.value,
tipo:tipo.value,
vip:vip.value,
desconto:desconto.value,
estoque:estoque.value,
status:"aprovado",
tempo:Date.now()+ (parseInt(tempo.value||3600)*1000)
});
}

/* STATUS */
function updateStatus(status){
db.ref("products/"+uid.value).update({status});
}

/* DELETE */
function deleteProduct(){
db.ref("products/"+uid.value).remove();
}

/* TIMER */
function formatTime(ms){
let s=Math.floor(ms/1000);
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;
return h+":"+m+":"+sec;
}

/* RENDER */
db.ref("products").on("value",snap=>{
let html="";
snap.forEach(i=>{
let d=i.val();
if(d.status!=="aprovado") return;

let left=d.tempo-Date.now();

html+=`
<div class="card">
<b>${d.produto}</b><br>

UID: ${d.uid}<br>
Vendedor: ${d.nome}<br>
Idade: ${d.idade||"-"}<br>

${d.descricao}<br>

Valor: R$ ${d.valor}<br>
Tipo: ${d.tipo}<br>
Plano: ${d.vip}<br>
Desconto: ${d.desconto}<br>

Instagram: ${d.instagram||"-"}<br>
TikTok: ${d.tiktok||"-"}<br>
Kwai: ${d.kwai||"-"}<br>

WhatsApp: ${d.whatsapp}<br>

Estoque: ${d.estoque}<br>

<div class="timer">
${left>0?formatTime(left):"Expirado"}
</div>

<button onclick="window.open('https://wa.me/${d.whatsapp}')">
Comprar
</button>
</div>`;
});

products.innerHTML=html;
});
</script>

</body>
  </html>
