<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINITY DIVULGAÇÕES</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#ff7a00;}
header{background:#111;padding:15px;text-align:center;font-size:20px;font-weight:bold;}

.container{padding:15px;}

input{
width:100%;padding:10px;margin:6px 0;
border-radius:8px;border:1px solid #333;
background:#111;color:#fff;
}

.btn{
background:red;color:#fff;
padding:12px;border:none;
border-radius:8px;width:100%;
cursor:pointer;
}

.card{
background:#111;padding:12px;
border-radius:10px;margin-bottom:10px;
}

button{cursor:pointer;}

#adminPanel{
position:fixed;top:0;right:-320px;
width:300px;height:100%;
background:#111;padding:10px;
transition:0.3s;overflow:auto;
}

#adminPanel.open{right:0;}

#loginBox{
position:fixed;bottom:80px;right:15px;
width:220px;background:#111;
padding:10px;display:none;
border-radius:10px;
}
</style>
</head>

<body>

<header>INFINITY DIVULGAÇÕES</header>

<div class="container">

<h3>Produtos cadastrados</h3>
<div id="lista"></div>

<hr>

<h3>Cadastro</h3>

<input id="vendedor" placeholder="vendedor">
<input id="produto" placeholder="produto">
<input id="descricao" placeholder="descrição">
<input id="valor" placeholder="valor">
<input id="whatsapp" placeholder="whatsapp">
<input id="instagram" placeholder="instagram">

<button class="btn" onclick="enviarProduto()">ENVIAR SOLICITAÇÃO</button>

</div>

<!-- ADMIN -->
<div id="adminPanel">
<h3>ADMIN</h3>

<button onclick="ativarTodos()">Ativar todos</button>
<button onclick="desativarTodos()">Desativar todos</button>
<button onclick="deletarTodos()">Deletar todos</button>

<div id="adminLista"></div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDXDca5ZxCZKZz7lHUz4dlx0Qe6BarJSuA",
authDomain: "infinity-vendas.firebaseapp.com",
databaseURL: "https://infinity-vendas-default-rtdb.firebaseio.com",
projectId: "infinity-vendas",
storageBucket: "infinity-vendas.appspot.com",
messagingSenderId: "613112794080",
appId: "1:613112794080:web:acd63b723aec957b21f985"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let isAdmin = false;

const lista = document.getElementById("lista");
const adminLista = document.getElementById("adminLista");

/* LOGIN */
function login(){
const email = document.getElementById("email").value;
const pass = document.getElementById("pass").value;

auth.signInWithEmailAndPassword(email, pass)
.then(()=>{
isAdmin = true;
document.getElementById("loginBox").style.display="none";
alert("ADMIN LIBERADO");
})
.catch(e=>{
alert("Erro: " + e.message);
});
}

/* ENVIAR PRODUTO */
function enviarProduto(){

const data = {
vendedor: document.getElementById("vendedor").value || "",
produto: document.getElementById("produto").value || "",
descricao: document.getElementById("descricao").value || "",
valor: document.getElementById("valor").value || "",
whatsapp: document.getElementById("whatsapp").value || "",
instagram: document.getElementById("instagram").value || "",
status: "pendente"
};

db.ref("products").push(data);

alert("Enviado!");
}

/* LISTA */
db.ref("products").on("value", snap=>{
let data = snap.val() || {};
let html = "";
let adminHTML = "";

for(let id in data){
let d = data[id];
if(!d) continue;

const produto = d.produto || "Sem produto";
const vendedor = d.vendedor || "Sem vendedor";
const valor = d.valor || "";
const status = d.status || "";

if(d.status === "aprovado"){
html += `
<div class="card">
<b>${produto}</b><br>
${vendedor}<br>
${valor}<br>
</div>`;
}

if(isAdmin){
adminHTML += `
<div class="card">
<b>${produto}</b><br>
Status: ${status}<br>

<button onclick="aprovar('${id}')">Ativar</button>
<button onclick="reprovar('${id}')">Desativar</button>
<button onclick="deletar('${id}')">Deletar</button>
</div>`;
}
}

lista.innerHTML = html;
adminLista.innerHTML = adminHTML;
});

/* ADMIN */
function aprovar(id){
db.ref("products/"+id).update({status:"aprovado"});
}

function reprovar(id){
db.ref("products/"+id).update({status:"desativado"});
}

function deletar(id){
db.ref("products/"+id).remove();
}

function ativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"aprovado"}));
});
}

function desativarTodos(){
db.ref("products").once("value",snap=>{
snap.forEach(c=>c.ref.update({status:"desativado"}));
});
}

function deletarTodos(){
db.ref("products").remove();
}
</script>

</body>
  </html>
